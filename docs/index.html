emove_pair(h)\n            if k2 != -1:\n                remove_pair(j)\n            sym[i] = idx\n            nxt[i] = k2\n            if k2 != -1:\n                prev[k2] = i\n            sym[j] = -1\n            prev[j] = nxt[j] = -1\n            if h != -1:\n                add_pair(h)\n            if k2 != -1:\n                add_pair(i)\n\n        pair_counts[pair] = 0\n        pair_positions[pair] = set()\n\n    return merges\n\n\ndef render(token: bytes) -> str:\n    \"\"\"Token bytes -> visible text; a partial utf-8 fragment shows as the replace char.\"\"\"\n    return token.decode(\"utf-8\", errors=\"replace\")\n\n\n# ══════════════════════════════════════════════════════════════════════════\n# showcase: train on data/*.txt, dump artifacts, print an EN-vs-ZH comparison\n# ══════════════════════════════════════════════════════════════════════════\n\nimport os\n\nDATA = os.path.join(os.path.dirname(os.path.abspath(__file__)), \"data\")\n\n\ndef save(stem: str, merges: dict[tuple[int, int], int]) -> None:\n    \"\"\"Write data/<stem>.model (reloadable) and data/<stem>.vocab (human-readable).\"\"\"\n    vocab = build_vocab(merges)\n    with open(os.path.join(DATA, stem + \".model\"), \"w\", encoding=\"utf-8\") as f:\n        f.write(\"# bpe merges in order; line N (0-based) defines token 256+N\\n\")\n        for a, b in merges:\n            f.write(f\"{a} {b}\\n\")\n    with open(os.path.join(DATA, stem + \".vocab\"), \"w\", encoding=\"utf-8\") as f:\n        f.write(f\"# {len(merges)} learned merges, in order. token = left + right\\n\")\n        for rank, ((a, b), idx) in enumerate(merges.items()):\n            f.write(f\"  {rank:>4}  {idx:>4}  {render(vocab[idx])!r:<16}\"\n                    f\"  =  {render(vocab[a])!r} + {render(vocab[b])!r}\\n\")\n\n\ndef token_kinds(merges: dict[tuple[int, int], int]) -> tuple[int, int, int]:\n    \"\"\"Count learned tokens as (multi-char words, single chars, byte fragments).\"\"\"\n    vocab = build_vocab(merges)\n    word = single = frag = 0\n    for i in range(256, 256 + len(merges)):\n        try:\n            length = len(vocab[i].decode(\"utf-8\"))\n        except UnicodeDecodeError:\n            frag += 1\n        else:\n            word += length >= 2\n            single += length == 1\n    return word, single, frag\n\n\ndef sanity() -> None:\n    \"\"\"Round-trip on tricky inputs (emoji / CJK / empty) and fast == naive.\"\"\"\n    toy = \"low lower lowest newer wider 🤗 中文 123456\"\n    merges = train_bpe(toy, 300)\n    for s in [toy, \"hello world\", \"🤗🤗🤗\", \"\"]:\n        assert decode(encode(s, merges), merges) == s, f\"round-trip failed: {s!r}\"\n    assert train_bpe_fast(toy, 300) == merges, \"fast != naive\"\n\n\ndef report(stem: str, label: str, check_naive: bool = False) -> tuple[str, dict]:\n    \"\"\"Train one corpus at vocab 512, dump artifacts, print a summary; return (text, merges).\"\"\"\n    import time\n\n    text = open(os.path.join(DATA, stem + \".txt\"), encoding=\"utf-8\").read()\n    nbytes = len(text.encode(\"utf-8\"))\n\n    t0 = time.time()\n    merges = train_bpe_fast(text, 512)\n    t_fast = time.time() - t0\n    if check_naive:\n        t0 = time.time()\n        assert train_bpe(text, 512) == merges, \"fast != naive\"\n        t_naive = time.time() - t0\n    assert decode(encode(text, merges), merges) == text, \"round-trip failed on corpus\"\n    save(stem, merges)\n\n    vocab = build_vocab(merges)\n    ids = encode(text, merges)\n    longest = sorted((vocab[i] for i in range(256, 256 + len(merges))), key=len, reverse=True)\n\n    print(f\"{label}   {len(text)} chars / {nbytes} bytes  ({nbytes / len(text):.2f} bytes/char)\")\n    print(f\"  vocab 512 -> {len(ids)} tokens, {nbytes / len(ids):.2f}x compression\")\n    if check_naive:\n        print(f\"  train  naive {t_naive:.2f}s | fast {t_fast:.2f}s | {t_naive / t_fast:.0f}x speedup\")\n    print(\"  first merges :\", \"  \".join(repr(render(vocab[i])) for i in range(256, 266)))\n    print(\"  longest      :\", \"  \".join(repr(render(t)) for t in longest[:8]))\n    return text, merges\n\n\ndef examples(merges: dict[tuple[int, int], int]) -> None:\n    \"\"\"Show how a few strings tokenize: common stays whole, rare splits apart.\"\"\"\n    vocab = build_vocab(merges)\n    for s in [\"Taylor Swift\", \" the album\", \"1989\", \"re-recording\", \"qwxz\"]:\n        ids = encode(s, merges)\n        print(f\"    {s!r:>14} -> {[render(vocab[i]) for i in ids]}\")\n\n\ndef compare(en_text: str, en_merges: dict, zh_text: str, zh_merges: dict) -> None:\n    \"\"\"Print the EN-vs-ZH scaling table and where each language spends its merges.\"\"\"\n    en_bytes, zh_bytes = len(en_text.encode(\"utf-8\")), len(zh_text.encode(\"utf-8\"))\n\n    print(\"\\nEnglish vs Chinese  (same ~60 KB byte budget):\")\n    print(f\"  {'vocab':>5} | {'EN tok':>7} {'B/tok':>5} {'ch/tok':>6}\"\n          f\" | {'ZH tok':>7} {'B/tok':>5} {'ch/tok':>6}\")\n    for vs in [512, 1024, 2048]:\n        ei = encode(en_text, train_bpe_fast(en_text, vs))\n        zi = encode(zh_text, train_bpe_fast(zh_text, vs))\n        print(f\"  {vs:>5} | {len(ei):>7} {en_bytes / len(ei):>5.2f} {len(en_text) / len(ei):>6.2f}\"\n              f\" | {len(zi):>7} {zh_bytes / len(zi):>5.2f} {len(zh_text) / len(zi):>6.2f}\")\n\n    ew, es, ef = token_kinds(en_merges)\n    zw, zs, zf = token_kinds(zh_merges)\n    print(f\"  of 256 merges @512:  EN words={ew} chars={es} fragments={ef}\"\n          f\"  |  ZH words={zw} chars={zs} fragments={zf}\")\n\n\nif __name__ == \"__main__\":\n    sanity()\n    en_text, en_merges = report(\"taylorswift\", \"English\", check_naive=True)\n    examples(en_merges)\n    print()\n    zh_text, zh_merges = report(\"taylorswift_zh\", \"Chinese\")\n    compare(en_text, en_merges, zh_text, zh_merges)\n", "code_file": "bpe.py", "zone": "language", "qwen": "BPE tokenizer", "replaces": "字符 / 词级切分", "who": "GPT · Llama · Qwen"}, {"key": "llm/rope", "name": "rope", "title": "llm/rope — RoPE", "oneliner": "RoPE replaces the *added* position vector with a *rotation*. Instead of adding a position embedding to the input once, it rotates each query and key by an angle", "mastery": "explained", "readme": "# llm/rope — RoPE\n\nRoPE replaces the *added* position vector with a *rotation*. Instead of adding a position\nembedding to the input once, it rotates each query and key by an angle proportional to its\nposition — inside every attention layer, on Q and K only (V untouched). The payoff: for fixed\n`q` and `k`, the *positional* part of the `q·k` dot product depends only on the relative offset\nbetween their positions, not on the absolute positions themselves. Zero learnable parameters,\nand it extrapolates beyond the trained length more naturally than learned absolute embeddings\n(though very long contexts still need scaling tricks like NTK / YaRN). Llama / Qwen / Mistral\nall use it.\n\n> **References** — Su et al., *RoFormer: Enhanced Transformer with Rotary Position Embedding*,\n> 2021 ([arXiv:2104.09864](https://arxiv.org/abs/2104.09864)) · reference impl:\n> `apply_rotary_emb` in [meta-llama/llama](https://github.com/meta-llama/llama).\n\n```\nclassic:  x₀ = embed(tok) + PE(pos)                          # absolute vector, added once before layer 0\nRoPE:     q, k = Wq·x, Wk·x   then   q ← R(m)·q,  k ← R(n)·k  # rotate by position, every layer, Q/K only\n          (R(m)q)ᵀ(R(n)k) = qᵀ R(m)ᵀR(n) k = qᵀ R(n−m) k     # R(m)ᵀR(n) = R(n−m): position enters only via the offset\n```\n\nThe `d_k` features are split into `d_k/2` pairs, each a 2-D vector rotated by `m·θ_i` with its\nown frequency `θ_i = base^(−2i/d_k)` — high-frequency pairs change rapidly and distinguish short\noffsets, low-frequency pairs change slowly and stay informative over long ranges. This\nimplementation uses the **split-half** layout, pairing `x_i` with `x_{i+d/2}` (Llama-style), so\n`rotate_half(x) = cat(−x[d/2:], x[:d/2])` supplies the 90° term of each pair. `build_rope_cache`\nprecomputes the `cos`/`sin` of every angle; `apply_rope` is then one line,\n`x·cos + rotate_half(x)·sin`.\n\n## Experiment (`python rope.py`)\n\nRotation preserves shape — RoPE changes *where* a vector points, not its dimensionality:\n\n```\nshape  (2, 4, 16, 32) --apply_rope--> (2, 4, 16, 32)\n```\n\nThen take one fixed `(q, k)` pair and score `q·k` after placing them at positions\n`(offset + s, s)` — here `offset = query_pos − key_pos` (= `m − n`, so the formula's rotation is\n`R(−offset)`), held fixed while both slide by `s`:\n\n```\n  offset      s=0      s=3      s=6\n       1   1.7848   1.7848   1.7848\n       4   7.1485   7.1485   7.1485\n       8   7.4501   7.4501   7.4501\n```\n\nRead it two ways. **Across a row** the score is constant: sliding both tokens by the same `s`\nleaves their absolute positions different but the offset unchanged — RoPE doesn't notice.\n**Down a column** the score moves with the offset. That single fact — absolute rotation,\nrelative attention — is the whole mechanism. The `(q, k)` pair is fixed here to isolate the\npositional part; in a real model `q` and `k` also depend on token content, so the score is never\ndistance-only — RoPE only makes its *positional* component depend on the relative offset.\n\n> Next: [`../gqa`](../gqa), then assemble in [`../nano`](../nano).\n", "code": "import torch\n\ndef build_rope_cache(seq_len, d_k, base=10000.0):\n\n    # [d_k//2]  \n    inv_freq = 1 / (base ** (torch.arange(0, d_k, 2).float() / d_k)) \n\n    # [seq_len]\n    positions = torch.arange(0, seq_len).float()\n\n    angles = torch.outer(positions, inv_freq)\n\n    angles = torch.cat([angles, angles], dim=-1)\n\n    cos = torch.cos(angles)\n    sin = torch.sin(angles)\n\n    return cos, sin\n\ndef rotate_half(x):\n    # Split Half\n    half = x.shape[-1]//2\n    x1 = x[..., :half]\n    x2 = x[..., half:]\n    return torch.cat([-x2, x1], dim=-1)\n\ndef apply_rope(x, cos, sin):\n    return x * cos + rotate_half(x) * sin\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    B, H, L, d_k = 2, 4, 16, 32\n    cos, sin = build_rope_cache(L, d_k)\n\n    x = torch.randn(B, H, L, d_k)\n    print(f\"shape  {tuple(x.shape)} --apply_rope--> {tuple(apply_rope(x, cos, sin).shape)}\")\n    assert apply_rope(x, cos, sin).shape == x.shape\n\n    # one (q, k) pair: the score q·k depends only on the offset m−n, not absolute position.\n    q, k = torch.randn(d_k), torch.randn(d_k)\n    def score(m, n):\n        qm = apply_rope(q.view(1, 1, 1, d_k), cos[m:m + 1], sin[m:m + 1])\n        kn = apply_rope(k.view(1, 1, 1, d_k), cos[n:n + 1], sin[n:n + 1])\n        return (qm * kn).sum().item()\n\n    print(f\"\\n{'offset':>8}{'s=0':>9}{'s=3':>9}{'s=6':>9}\")\n    for off in (1, 4, 8):\n        row = [score(off + s, s) for s in (0, 3, 6)]          # same offset, shifted by s\n        print(f\"{off:>8}\" + \"\".join(f\"{v:>9.4f}\" for v in row))\n        assert max(abs(v - row[0]) for v in row) < 1e-5         # constant across the shift", "code_file": "rope.py", "zone": "language", "qwen": "RoPE 位置编码", "replaces": "正弦绝对位置", "who": "几乎所有现代 LLM"}, {"key": "llm/rmsnorm", "name": "rmsnorm", "title": "llm/rmsnorm — RMSNorm", "oneliner": "RMSNorm is LayerNorm with the centering removed: no mean subtraction, no bias. It keeps only the scaling — divide each token vector by its root-mean-square. One", "mastery": "explained", "readme": "# llm/rmsnorm — RMSNorm\n\nRMSNorm is LayerNorm with the centering removed: no mean subtraction, no bias. It keeps\nonly the scaling — divide each token vector by its root-mean-square. One statistic instead\nof two, one parameter group instead of two, and deeper Transformers train more stably.\nLlama / T5 / Qwen all use it.\n\n> **References** — Zhang & Sennrich, *Root Mean Square Layer Normalization*, NeurIPS 2019\n> ([arXiv:1910.07467](https://arxiv.org/abs/1910.07467)) · reference impl: `RMSNorm` in\n> [meta-llama/llama](https://github.com/meta-llama/llama).\n\n```\nLayerNorm(x) = (x − mean(x)) / sqrt(var(x) + ε) · γ + β     # center, then scale, + bias\nRMSNorm(x)   =  x            / sqrt(mean(x²) + ε) · g        # scale only, no bias\n```\n\n## Experiment (`python rmsnorm.py`)\n\nSame input `x` of shape `[4, 8]` through both norms:\n\n```\n            row mean   row rms\nLayerNorm      0.000     1.000\nRMSNorm        0.332     1.000\n```\n\nBoth pin every row to **rms 1** — the scaling they share. Only LayerNorm also forces\n**mean 0** (centering); RMSNorm leaves the mean alone, so its outputs stay off-center.\n\nThen shift every input by a constant, `x → x + 3`:\n\n```\nshift +3      max|Δ|\nLayerNorm      0.000\nRMSNorm        2.368\n```\n\nLayerNorm is **shift-invariant** — subtracting the mean cancels the constant. RMSNorm is\nnot: the constant enters `mean(x²)` and changes every output. That single asymmetry is the\nwhole difference between the two.\n\n> Next: [`../swiglu`](../swiglu) / [`../gqa`](../gqa).\n", "code": "import torch\nimport torch.nn as nn\n\nclass RMSNorm(nn.Module):\n    def __init__(self, dim: int, eps: float = 1e-6):\n        super().__init__()\n        self.dim = dim\n        self.eps = eps\n        self.para = nn.Parameter(torch.ones(dim))\n    \n    def _norm(self, x):\n        return x * torch.rsqrt(x.pow(2).mean(-1, keepdim=True) + self.eps) \n    \n    def forward(self, x):\n        return self.para * self._norm(x.float()).type_as(x) # bf16 - fp32 - bf16\n\n\ndef stats(y):\n    return y.mean(-1).abs().mean(), y.pow(2).mean(-1).sqrt().mean()\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    x = torch.randn(4, 8)\n    ln, rms = nn.LayerNorm(8), RMSNorm(8)\n\n    print(f\"{'':10}{'row mean':>10}{'row rms':>10}\")\n    for name, f in [(\"LayerNorm\", ln), (\"RMSNorm\", rms)]:\n        m, r = stats(f(x))\n        print(f\"{name:10}{m:>10.3f}{r:>10.3f}\")\n\n    print(f\"\\n{'shift +3':10}{'max|Δ|':>10}\")\n    for name, f in [(\"LayerNorm\", ln), (\"RMSNorm\", rms)]:\n        print(f\"{name:10}{(f(x + 3) - f(x)).abs().max():>10.3f}\")\n    \n    \n", "code_file": "rmsnorm.py", "zone": "language", "qwen": "RMSNorm", "replaces": "LayerNorm", "who": "Llama · Qwen"}, {"key": "llm/swiglu", "name": "swiglu", "title": "llm/swiglu — SwiGLU", "oneliner": "SwiGLU replaces the FFN's single activated path with two parallel projections multiplied together: one branch passes through SiLU and acts as a per-element **ga", "mastery": "explained", "readme": "# llm/swiglu — SwiGLU\n\nSwiGLU replaces the FFN's single activated path with two parallel projections multiplied\ntogether: one branch passes through SiLU and acts as a per-element **gate**, while the other\ncarries the **content**. Their element-wise product is then projected back down. This uses\nthree matrices instead of two, so to keep the parameter budget **nearly identical**, the\nhidden width shrinks to `⅔·4d`. Llama / PaLM / Qwen all use it.\n\n> **References** — Shazeer, *GLU Variants Improve Transformer*, 2020\n> ([arXiv:2002.05202](https://arxiv.org/abs/2002.05202)) · reference impl: `FeedForward` in\n> [meta-llama/llama](https://github.com/meta-llama/llama).\n\n```\nclassic FFN:  out = W2( GELU(W1 x) )                    # 2 matrices, one path\nSwiGLU:       out = W_down( SiLU(W_gate x) ⊙ (W_up x) )  # 3 matrices, gate ⊙ content\n```\n\n## Experiment (`python swiglu.py`)\n\nA `d=512` SwiGLU against a classic `d→4d→d` FFN:\n\n```\n              hidden      params\nclassic FFN     2048   2,097,152\nSwiGLU          1365   2,096,640\n```\n\nThe classic FFN spends `2·(d·4d) = 8d²` parameters on two matrices. SwiGLU has three\nmatrices, so it shrinks the hidden width from `4d` to `⅔·4d ≈ 1365`; this gives\n`3·(d·⅔·4d) = 8d²` again, up to rounding. The point of the design is to spend the same\nparameter budget on **a gate instead of pure width**.\n\n```\nshape          (2, 5, 512) -> (2, 5, 512)\n```\n\nShape in equals shape out — SwiGLU is a drop-in replacement for the FFN, so it slots\nstraight into the [`../nano`](../nano) block. The whole mechanism is the `⊙`: instead of\nmerely activating a single projection, SwiGLU learns a second projection that decides which\ncontent features should be amplified or suppressed. That input-dependent gating is what\nmakes it more than a narrower plain FFN.\n\n> Next: [`../gqa`](../gqa); assembled in [`../nano`](../nano).\n", "code": "import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\nclass SwiGLU(nn.Module):\n    def __init__(self, d: int, hidden: int | None = None):\n        super().__init__()\n        hidden = hidden or int (2/3 * 4 * d) # 2 / 3 parameters for each weight matrix, the same as origin\n        self.w_gate = nn.Linear(d, hidden, bias=False)\n        self.w_up = nn.Linear(d, hidden, bias=False)  \n        self.w_down = nn.Linear(hidden, d, bias=False)\n\n    def forward(self, x):\n        return self.w_down(F.silu(self.w_gate(x)) * self.w_up(x))\n\n\ndef nparams(m):\n    return sum(p.numel() for p in m.parameters())\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    d = 512\n    x = torch.randn(2, 5, d)\n    ff = SwiGLU(d)\n    classic = nn.Sequential(nn.Linear(d, 4 * d, bias=False), nn.GELU(),\n                            nn.Linear(4 * d, d, bias=False))   # d→4d→d\n\n    print(f\"{'':12}{'hidden':>8}{'params':>12}\")\n    for name, m, h in [(\"classic FFN\", classic, 4 * d), (\"SwiGLU\", ff, ff.w_gate.out_features)]:\n        print(f\"{name:12}{h:>8}{nparams(m):>12,}\")\n\n    print(f\"\\n{'shape':12}{str(tuple(x.shape)):>14} -> {tuple(ff(x).shape)}\")\n    assert ff(x).shape == x.shape\n\n", "code_file": "swiglu.py", "zone": "language", "qwen": "SwiGLU FFN", "replaces": "ReLU / GELU FFN", "who": "Llama · Qwen"}, {"key": "llm/gqa", "name": "gqa", "title": "llm/gqa — Grouped-Query Attention", "oneliner": "Grouped-Query Attention keeps all `H` query heads but projects K and V to fewer heads, `H_kv < H`, with each K/V head shared by a group of `H/H_kv` query heads.", "mastery": "explained", "readme": "# llm/gqa — Grouped-Query Attention\n\nGrouped-Query Attention keeps all `H` query heads but projects K and V to fewer heads,\n`H_kv < H`, with each K/V head shared by a group of `H/H_kv` query heads. The counter-intuitive\npart: this saves almost no training compute. Every query head still forms its own `[L, L]` score\ntable, so the attention matmuls are unchanged — the only thing that shrinks is the K/V\n*projection*, a rounding error next to the FFN. What GQA actually buys is **inference**: the\nKV-cache stores `H_kv` heads instead of `H`, so it is `H/H_kv×` smaller, and autoregressive\ndecode — which is bound by reading that cache out of HBM, not by FLOPs — has that much less to\nmove each step. MHA is the `H_kv = H` end of the spectrum, MQA the `H_kv = 1` end; GQA sits in\nbetween. Llama 2 70B / Mistral / Qwen all use it.\n\n> **References** — Ainslie et al., *GQA: Training Generalized Multi-Query Transformer Models from\n> Multi-Head Checkpoints*, EMNLP 2023 ([arXiv:2305.13245](https://arxiv.org/abs/2305.13245)) ·\n> predecessor MQA: Shazeer, *Fast Transformer Decoding: One Write-Head is All You Need*, 2019\n> ([arXiv:1911.02150](https://arxiv.org/abs/1911.02150)) · reference impl: `repeat_kv` in\n> [huggingface/transformers](https://github.com/huggingface/transformers).\n\n```\nMHA:  wq, wk, wv : d → H·d_k       H query heads ↔ H kv heads\nGQA:  wq         : d → H·d_k       H query heads\n      wk, wv     : d → H_kv·d_k    H_kv kv heads, each shared by H/H_kv queries   ← the only change\n      scores : still H separate [L,L] tables  → no FLOP saving\n      cache  : only H_kv heads                → H/H_kv× smaller                   ← the whole point\n```\n\nThe `H` query heads split into `H_kv` groups of `H/H_kv`; group `g` (the consecutive heads\n`g·n_rep … g·n_rep+n_rep−1`) all attend through K/V head `g`. There are two honest ways to run the\nattention given that head-count mismatch. **C — broadcast** (`forward_grouped`): reshape the query\nheads into their groups (`q.unflatten(1, (H_kv, n_rep))`) and give K/V a size-1 axis\n(`k.unsqueeze(2)`) so the shared head broadcasts across the group — no copy, but it still\nmaterializes the full `[B, H, L, L]` scores. **D — fused** (`forward`):\n`F.scaled_dot_product_attention(..., enable_gqa=True)` groups inside the kernel and tiles, so the\n`L×L` scores never reach HBM; it is the only path that removes the `O(L²)` term, and it falls back\nto C on torch < 2.5. (The textbook `repeat_kv` is just C with the broadcast copied out — same\nresult, wasted memory — so it is not kept here.)\n\n## Experiment (`python gqa.py`)\n\nThe one asymmetry, in the shapes — `q` carries `H` heads, `k,v` stay at `H_kv`:\n\n```\nq    (2, 8, 16, 64)   H=8 heads\nk,v  (2, 2, 16, 64)   H_kv=2 heads\nout  (2, 16, 512)\n```\n\nThe broadcast path and the fused kernel agree to the bit, and at `H_kv = H` GQA collapses back to\nplain MHA:\n\n```\nforward (SDPA enable_gqa) == forward_grouped (broadcast)\nH_kv = H degenerates to plain MHA\n```\n\nThen price the KV-cache at 7B scale (32 layers, `L=8192`, `d_k=128`, bf16):\n\n```\n        H_kv       cache    vs MHA\nMHA       32     4.00 GiB       1x\nGQA        8     1.00 GiB       4x\nMQA        1     0.12 GiB      32x\n```\n\nThe cache shrinks by exactly `H/H_kv` — 4 GiB → 1 GiB moving from 32 KV heads to 8 — because it\nonly ever stores `H_kv` heads. That number is GQA's entire reason to exist: not fewer FLOPs, just\nless to read back each decode step. The quality cost is small (the paper places GQA close to MHA\nand well above MQA), which is why 8 KV heads is a common production pick.\n\n> Next: assemble with rope + rmsnorm + swiglu in [`../nano`](../nano); the inference payoff is\n> realized in [`../kvcache`](../kvcache).\n", "code": "import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport sys, pathlib\nsys.path.insert(0, str(pathlib.Path(__file__).resolve().parents[1]))\nfrom rope.rope import apply_rope\n\nclass GQA(nn.Module):\n    def __init__(self, d, n_heads, n_kv_heads):\n        super().__init__()\n        assert n_heads % n_kv_heads == 0\n        self.n_heads, self.n_kv_heads = n_heads, n_kv_heads\n        self.n_rep = n_heads // n_kv_heads\n        self.d_k = d // n_heads\n        self.wq = nn.Linear(d, n_heads * self.d_k, bias=False)\n        self.wk = nn.Linear(d, n_kv_heads * self.d_k, bias=False)\n        self.wv = nn.Linear(d, n_kv_heads * self.d_k, bias=False)\n        self.wo = nn.Linear(n_heads * self.d_k, d, bias=False)\n\n    def _qkv(self, x):\n        B, L, _ = x.shape\n        q = self.wq(x).view(B, L, self.n_heads, self.d_k).transpose(1, 2)\n        k = self.wk(x).view(B, L, self.n_kv_heads, self.d_k).transpose(1, 2)\n        v = self.wv(x).view(B, L, self.n_kv_heads, self.d_k).transpose(1, 2)\n        return q, k, v\n\n    def _merge(self, o):\n        B, _, L, _ = o.shape\n        return self.wo(o.transpose(1, 2).reshape(B, L, self.n_heads * self.d_k))\n\n    def _grouped_attn(self, q, k, v, causal):\n        Lq = q.size(-2)\n        q = q.unflatten(1, (self.n_kv_heads, self.n_rep))\n        k, v = k.unsqueeze(2), v.unsqueeze(2)\n        scores = q @ k.transpose(-2, -1) / self.d_k ** 0.5\n        if causal:\n            mask = torch.triu(torch.ones(Lq, Lq, dtype=torch.bool, device=q.device), diagonal=1)\n            scores = scores.masked_fill(mask, float(\"-inf\"))\n        return (scores.softmax(-1) @ v).flatten(1, 2)\n\n    def _sdpa_attn(self, q, k, v, causal):\n        try:\n            return F.scaled_dot_product_attention(q, k, v, is_causal=causal, enable_gqa=True)\n        except TypeError:\n            return self._grouped_attn(q, k, v, causal)\n\n    def forward(self, x, cos=None, sin=None, causal=True):\n        q, k, v = self._qkv(x)\n        if cos is not None:\n            q, k = apply_rope(q, cos, sin), apply_rope(k, cos, sin)\n        return self._merge(self._sdpa_attn(q, k, v, causal))\n\n    def forward_grouped(self, x, causal=True):\n        q, k, v = self._qkv(x)\n        return self._merge(self._grouped_attn(q, k, v, causal))\n\n\ndef kv_cache_bytes(n_layers, L, n_kv_heads, d_k, bytes_per=2):\n    return 2 * n_layers * L * n_kv_heads * d_k * bytes_per\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    B, L, d, H, H_kv = 2, 16, 512, 8, 2\n    att = GQA(d, H, H_kv).eval()\n    x = torch.randn(B, L, d)\n\n    q, k, v = att._qkv(x)\n    print(f\"q    {tuple(q.shape)}   H={H} heads\")\n    print(f\"k,v  {tuple(k.shape)}   H_kv={H_kv} heads\")\n    print(f\"out  {tuple(att(x).shape)}\")\n    assert att(x).shape == x.shape\n\n    # the broadcast path (C) and the fused kernel (D) must agree\n    assert torch.allclose(att(x), att.forward_grouped(x), atol=1e-4)\n    print(\"\\nforward (SDPA enable_gqa) == forward_grouped (broadcast)\")\n\n    # H_kv == H is plain MHA: enable_gqa must match vanilla SDPA\n    mha = GQA(d, H, H).eval()\n    qh, kh, vh = mha._qkv(x)\n    ref = mha._merge(F.scaled_dot_product_attention(qh, kh, vh, is_causal=True))\n    assert torch.allclose(mha(x), ref, atol=1e-4)\n    print(\"H_kv = H degenerates to plain MHA\")\n\n    # KV-cache at 7B scale: 32 layers, L=8192, d_k=128, bf16; shrinks exactly H/H_kv\n    mha_c = kv_cache_bytes(32, 8192, 32, 128)\n    print(f\"\\n{'':6}{'H_kv':>6}{'cache':>12}{'vs MHA':>10}\")\n    for name, hkv in [(\"MHA\", 32), (\"GQA\", 8), (\"MQA\", 1)]:\n        c = kv_cache_bytes(32, 8192, hkv, 128)\n        print(f\"{name:6}{hkv:>6}{c / 2**30:>9.2f} GiB{f'{mha_c // c}x':>9}\")\n        assert mha_c // c == 32 // hkv\n", "code_file": "gqa.py", "zone": "language", "qwen": "GQA", "replaces": "MHA（多头全 KV）", "who": "Llama · Qwen"}, {"key": "llm/nano", "name": "nano", "title": "llm/nano — a decoder-only mini-Llama", "oneliner": "Compared with the classic Transformer block the residual shape is unchanged; the swapped parts are MHA→GQA, LayerNorm→RMSNorm, GELU-MLP→SwiGLU, and absolute-PE→", "mastery": "explained", "readme": "# llm/nano — a decoder-only mini-Llama\n\n`nano` is where the four mechanisms stop being isolated parts and become a model. The modern\ndecoder block is two **pre-norm residuals** — `x = x + GQA(RMSNorm(x))` then\n`x = x + SwiGLU(RMSNorm(x))`, with RoPE rotating Q/K inside the attention. Stack `N` of these\nbetween a token embedding and a tied LM head and you have a decoder-only language model: the\nLlama architecture, minus scale. The counter-intuitive part is how little the assembly adds —\nevery piece was already written and unit-tested on its own, so `nano` is mostly wiring, plus the\ntwo things that only exist at the model level: the residual stream and next-token training.\nLlama / Qwen / Mistral are all this block, wider and deeper.\n\n> **References** — Touvron et al., *LLaMA: Open and Efficient Foundation Language Models*, 2023\n> ([arXiv:2302.13971](https://arxiv.org/abs/2302.13971)) · architecture from Vaswani et al.,\n> *Attention Is All You Need*, 2017 ([arXiv:1706.03762](https://arxiv.org/abs/1706.03762)) ·\n> reference impls: [karpathy/nanoGPT](https://github.com/karpathy/nanoGPT),\n> [meta-llama/llama](https://github.com/meta-llama/llama).\n\n```\nNanoLLM =\n  token embedding\n  → N × [ x = x + GQA( RMSNorm(x), RoPE, causal )   # causal self-attention — the decoder-only part\n          x = x + SwiGLU( RMSNorm(x) ) ]            # two pre-norm residuals per block\n  → final RMSNorm\n  → tied LM head\n  → next-token loss\n```\n\nCompared with the classic Transformer block the residual shape is unchanged; the swapped parts\nare MHA→GQA, LayerNorm→RMSNorm, GELU-MLP→SwiGLU, and absolute-PE→RoPE. Three wiring facts carry\nthe rest. **Pre-norm**: each sub-layer normalizes a *copy* of the stream and adds the result back\nto the un-normalized `x`, so the residual highway runs clean from embedding to head — which is\nexactly why a final `RMSNorm` is needed before the LM head. **RoPE lives inside attention**:\n`build_rope_cache` runs once at construction (sized by `d_k` and `max_len`), and the same\n`cos`/`sin`, sliced to the current length, feed every layer — the rotation hits Q and K *after*\nthe head split, never the residual stream. **Decoder-only is the causal mask**: GQA runs with\n`causal=True`, so position `t` attends only to `≤ t` — flip it to `False` and the same block is a\nbidirectional encoder. That one constraint, plus next-token teacher forcing (a single forward\nscores every position at once, `loss = CrossEntropy(logits[:, :-1], ids[:, 1:])`) and a\nweight-tied LM head (`lm_head.weight = embed.weight`, one shared `[vocab, d]` Parameter), is what\nmakes this a generative decoder rather than an encoder.\n\nUnlike the single-file reference, this `nano.py` **imports the real component files**: a two-line\npath shim puts `llm/` on `sys.path`, then `from rope.rope import build_rope_cache`,\n`from gqa.gqa import GQA`, and so on. The components stop being throwaway exercises and become the\nengine — a fix in `rope.py` propagates here, and the same `NanoLLM` is later reused by the scaled\nexperiment instead of being rewritten.\n\n## Experiment (`python nano.py`)\n\nA 2-layer `d=64` model (92K params) trained 300 steps on a char-level description of its own\narchitecture:\n\n```\nvocab 26  params 91,840\nshape  ids (1, 8) --NanoLLM--> logits (1, 8, 26)\nstep    0  loss 3.280\nstep   50  loss 0.352\nstep  150  loss 0.062\nstep  299  loss 0.051\n\ngreedy from 'rope rot':\nrope rotates the queries and keys. rmsnorm rescales the stream. swiglu gates the feed forward. gqa shares the kv heads. stack th\n```\n\nThe loss starts at `ln(26) ≈ 3.26` — the entropy of a uniform guess over 26 characters — and\nfalls to `~0.05` as the model memorizes the text, after which greedy decoding recites it back.\nThis is memorization on purpose, not generalization: on a few hundred characters the only claim\nbeing proved is that the assembled pipeline trains and generates end-to-end. It is also the first\ntime the four hand-written components, composed through imports, run together as one model.\n", "code": "import sys\nimport pathlib\nsys.path.insert(0, str(pathlib.Path(__file__).resolve().parents[1]))  # put llm/ on the path\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\nfrom rope.rope import build_rope_cache         \nfrom rmsnorm.rmsnorm import RMSNorm            \nfrom swiglu.swiglu import SwiGLU               \nfrom gqa.gqa import GQA                       \n\nclass ModernBlock(nn.Module):\n    def __init__(self, d, n_heads, n_kv_heads, ffn_factory=None):\n        super().__init__()\n        self.att_norm = RMSNorm(d)\n        self.att = GQA(d, n_heads, n_kv_heads)\n        self.ffn_norm = RMSNorm(d)\n        self.ffn = (ffn_factory or (lambda dim: SwiGLU(dim)))(d)\n\n    def forward(self, x, cos, sin):\n        x = x + self.att(self.att_norm(x), cos, sin)\n        out = self.ffn(self.ffn_norm(x))\n        if isinstance(out, tuple):              # MoE -> (out, aux, idx); SwiGLU -> tensor\n            out, self.aux, self.idx = out\n        else:\n            self.aux, self.idx = None, None\n        return x + out\n    \n\nclass NanoLLM(nn.Module):\n    def __init__(self, vocab, d, n_layers, n_heads, n_kv_heads, max_len, ffn_factory=None):\n        super().__init__()\n        self.embed = nn.Embedding(vocab, d)\n        self.blocks = nn.ModuleList(ModernBlock(d, n_heads, n_kv_heads, ffn_factory) for _ in range(n_layers))\n        self.norm = RMSNorm(d)\n        self.lm_head = nn.Linear(d, vocab, bias=False)\n        self.lm_head.weight = self.embed.weight   \n        nn.init.normal_(self.embed.weight, std=0.02)\n        self.max_len = max_len\n        cos, sin = build_rope_cache(max_len, d // n_heads)\n        self.register_buffer(\"cos\", cos, persistent=False)\n        self.register_buffer(\"sin\", sin, persistent=False)\n\n    def forward(self, ids=None, targets=None, inputs_embeds=None, input_embeds=None):\n        if inputs_embeds is not None and input_embeds is not None:\n            raise ValueError(\"pass only one of inputs_embeds or input_embeds\")\n        if inputs_embeds is None:\n            inputs_embeds = input_embeds\n        if inputs_embeds is None:\n            if ids is None:\n                raise ValueError(\"ids or inputs_embeds is required\")\n            L = ids.shape[1]\n            x = self.embed(ids)\n        else:\n            L = inputs_embeds.shape[1]\n            x = inputs_embeds\n\n        for block in self.blocks:\n            x = block(x, self.cos[:L], self.sin[:L])\n        self.aux = sum((b.aux for b in self.blocks if b.aux is not None), 0)  # scalar; 0 if dense\n        self.routing = [b.idx for b in self.blocks if b.idx is not None]      # per-MoE-layer expert ids\n        return self.lm_head(self.norm(x))\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n\n    # the assembled model memorizes a description of itself\n    text = (\"rope rotates the queries and keys. rmsnorm rescales the stream. \"\n            \"swiglu gates the feed forward. gqa shares the kv heads. \"\n            \"stack the blocks and the nano llm predicts the next token. \") * 4\n    chars = sorted(set(text))\n    stoi = {c: i for i, c in enumerate(chars)}\n    data = torch.tensor([stoi[c] for c in text])\n\n    B, L = 16, 64\n    model = NanoLLM(vocab=len(chars), d=64, n_layers=2, n_heads=4, n_kv_heads=2, max_len=L)\n    assert model.lm_head.weight is model.embed.weight            # weight tying: same Parameter\n    print(f\"vocab {len(chars)}  params {sum(p.numel() for p in model.parameters()):,}\")\n\n    ids = data[:8].view(1, -1)\n    print(f\"shape  ids {tuple(ids.shape)} --NanoLLM--> logits {tuple(model(ids).shape)}\")\n\n    # next-token training: every position gets a loss in one forward (teacher forcing)\n    opt = torch.optim.AdamW(model.parameters(), lr=3e-3)\n    losses = []\n    for step in range(300):\n        starts = torch.randint(0, len(data) - L - 1, (B,))\n        batch = torch.stack([data[s:s + L + 1] for s in starts])\n        logits = model(batch[:, :-1])                            # [B, L, vocab]\n        loss = F.cross_entropy(logits.reshape(-1, len(chars)), batch[:, 1:].reshape(-1))\n        opt.zero_grad(); loss.backward(); opt.step()\n        losses.append(loss.item())\n        if step % 50 == 0 or step == 299:\n            print(f\"step {step:>4}  loss {loss.item():.3f}\")\n\n    first, last = sum(losses[:20]) / 20, sum(losses[-20:]) / 20\n    assert last < first * 0.9, (first, last)                     # the pipeline actually learns\n\n    # greedy decode (naive, recompute the whole sequence each step — kvcache optimizes this)\n    ids = data[:8].view(1, -1)                                   # prompt: 'rope rot'\n    for _ in range(120):\n        logits = model(ids[:, -model.max_len:])                  # crop to the rope cache\n        ids = torch.cat([ids, logits[:, -1].argmax(-1, keepdim=True)], dim=1)\n    print(f\"\\ngreedy from {text[:8]!r}:\\n{''.join(chars[i] for i in ids[0])}\")\n", "code_file": "nano.py", "zone": "language", "qwen": "组装 · 小型 causal LLM", "replaces": "—", "who": "把上面拼成可训练 LLM"}, {"key": "llm/kvcache", "name": "kvcache", "title": "llm/kvcache — KV 缓存 + 采样（推理时的事）", "oneliner": "训练时整条序列一次算完。**生成**时只能一个一个吐：吐第 `t` 个 token 时，它要 attend 前面", "mastery": "spec", "readme": "# llm/kvcache — KV 缓存 + 采样（推理时的事）\n\n> **📌 一手出处 / official reference**\n> - KV-cache 思想 *Fast Transformer Decoding: One Write-Head is All You Need* — Shazeer, 2019 · [arXiv:1911.02150](https://arxiv.org/abs/1911.02150)\n> - 采样 *The Curious Case of Neural Text Degeneration*（top-p / nucleus）— Holtzman et al., ICLR 2020 · [arXiv:1904.09751](https://arxiv.org/abs/1904.09751)；*Hierarchical Neural Story Generation*（top-k）— Fan et al., ACL 2018 · [arXiv:1805.04833](https://arxiv.org/abs/1805.04833)\n> - 参考实现 [karpathy/nanoGPT](https://github.com/karpathy/nanoGPT) 的 `generate`\n\n> 学习笔记 + 复现 spec。目标：复现完 [`kvcache.py`](kvcache.py) 后，能讲清\n> **「训练并行 vs 推理自回归的不对称，以及为什么缓存 K/V 能把每步从 O(L²) 降到 O(L)」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码，不必重读正文。\n\n## 一句话 mental model\n\n训练时整条序列一次算完。**生成**时只能一个一个吐：吐第 `t` 个 token 时，它要 attend 前面\n`t−1` 个位置的 K、V——而这些**上一步已经算过了**。把它们**缓存**起来，每新一步只算「当前这一个\ntoken 的 q/k/v」，不再重算历史 → 每步从 `O(L²)` 降到 `O(L)`。\n\n## 🎯 反直觉 1 ｜ 先猜：K/V 要缓存，为什么 Q 不用？（想 30 秒再往下）\n\n**答案：注意力的不对称——过去位置的 k/v 会被未来每一步反复查询，过去的 q 用完即弃。**\n\n```\n第 t 步:  只为新 token 算  q_t, k_t, v_t\n          k_t, v_t  ──追加进 cache──►  [k_1..k_t], [v_1..v_t]\n          注意力:   q_t  对  缓存里的所有 K/V  做一次 attention  →  下一个 token 的 logits\n```\n- **Q 不缓存**：每步只用当前的 `q_t`，过去的 q 再也用不到。\n- **K/V 缓存**：过去每个位置的 k/v 会被未来每一步反复用到，所以存下来。\n- 这正是 [`../gqa`](../gqa) 省显存的兑现点：cache 大小 ∝ KV 头数。\n\n## 🎯 反直觉 2 ｜ 先猜：同一个模型，换个采样策略为什么质量天差地别？\n\n**因为模型每步只吐 vocab 上的一个概率分布，「聪明」的另一半在 sampler 怎么挑。**\n\n| 采样 | 做法 | 效果 |\n|---|---|---|\n| greedy | 每步取 argmax | 确定、易复读 |\n| temperature `T` | logits / T 后再 softmax | T↑ 更随机，T↓ 更尖锐 |\n| top-k | 只在概率最高的 k 个里采 | 砍掉长尾噪声 |\n| top-p (nucleus) | 只在累积概率达 p 的最小集合里采 | 自适应候选数 |\n\n实现要点（照这个写不踩坑）：\n\n- temperature：`logits / T` 再 softmax；T→0 的极限就是 argmax。\n- top-k：`torch.topk` 拿到第 k 大的值，比它小的 logits 置 `-inf`。\n- top-p：logits 降序排序 → softmax → `cumsum` → 砍掉「累积概率已超 p」的尾巴，\n  **砍之前把超标 mask 右移一位、永远保留第 1 名**（否则 p 比最大概率还小时会一个候选都不剩）\n  → 按排序索引散射回原顺序置 `-inf`。\n- greedy 必须走 `argmax` 而不是 `multinomial`，等价性测试要求它完全确定。\n\n## 管线约定（设计决策，照抄即可——学习价值在机制，不在猜接口）\n\n[`../ref/nano.py`](../ref/nano.py) 的 `forward(ids)` 不认识 cache，先做一次小重构。约定一条\n**唯一的 forward 路径**，训练 / prefill / 逐 token decode 全是它的特例：\n\n```python\nclass KVCache:\n    # 每层一份，沿 t 维增长:  k[i], v[i]: [B, H_kv, t, d_k]\n    def update(self, i, k_new, v_new): ...   # 第 i 层追加，返回追加后的全量 (k, v)\n    def truncate(self, t): ...               # 所有层切回前 t 位（specdec 拒稿回滚用）\n    @property\n    def t(self): ...                         # 当前已缓存长度，空 cache 为 0\n\ndef NanoLLM.forward(ids, cache=None)         # ids [B, n_new] -> logits [B, n_new, vocab]\n# 训练:    cache=None        —— 行为与重构前完全一致\n# prefill: cache 空, n_new=L₀\n# decode:  cache 长 t, n_new=1（specdec 的验证步则是 n_new=k+1）\n\n@torch.no_grad()\ndef decode_step(model, ids_new, cache): return model(ids_new, cache)   # 薄封装\ndef generate(model, prompt_ids, max_new, sampler):\n    # 1) prefill: decode_step(prompt)   2) 循环: decode_step(上一个 token) → 采样 → 追加\ndef sample(logits, temperature=1.0, top_k=None, top_p=None): ...\n```\n\n带 cache 时 attention 内部只有三处不同（=== DIFF vs 训练 forward ===）：\n\n1. **rope 按绝对位置取片**：`cos[t : t+n_new]` 而不是 `cos[:n_new]`——新 token 的绝对位置\n   从 t 起跳，从 0 取会把它们当成序列开头。\n2. **k/v 先进 cache 再用全量**：`k, v = cache.update(layer_idx, k, v)`。\n3. **mask 变长方形** `[n_new, t+n_new]`：新 chunk 内部 causal、对 cache 全可见——\n\n   ```python\n   mask = torch.triu(torch.ones(n_new, t + n_new, dtype=torch.bool), diagonal=t + 1)\n   ```\n\n   自查：第 i 行是绝对位置 t+i，应能看见第 0..t+i 列。`n_new=1` 时 mask 全 False（看全部\n   历史）；`t=0, n_new=L` 时退化为训练用的下三角——所以训练路径不需要单独的 mask 代码。\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **`sample()` 单独写、单独测**：greedy / temperature / top-k / top-p。\n   断言：`top_p=1.0`、`top_k=vocab` 不改变分布；T 很小时 sample 结果 == argmax。\n2. **forward 接 cache，只支持 n_new=1**：prefill 暂时用「全序列重算取最后一位」凑合。\n   断言（主断言的最小版）：贪心生成 20 token == 每步全序列重算的贪心，逐 token 相同。\n3. **推广 n_new>1**：写代码前先在纸上画出 `t=3, n_new=2` 的 mask。prefill 改用\n   `decode_step(整个 prompt)`。\n   断言：`decode_step(prompt)` 的 logits == 训练式 `forward(prompt)` 的 logits（allclose）。\n4. **`generate()` 串起来**，跑 ⭐ 的完整等价性测试。\n5. **`truncate()` 回滚**。断言：「算到 t=10 → 回滚到 5 → 续算 5 个」 == 「一口气算到 10」。\n6. **采样 demo**：固定种子，同一 prompt 对比 greedy / T=0.8 / top-k=5 / top-p=0.9。\n\n第 3、5 级和 rope 取片正是 [`../specdec`](../specdec) 的接口契约（验证步一次喂 k+1 个\ndraft token、拒稿后回滚），现在写对免得返工。\n\n## ⭐ 必做的 sanity\n\n> **等价性测试**（仿 `common.py` 那种具体不变量）：同一 prompt + **贪心**解码，\n> 「带 KV-cache 增量生成」的输出，必须和「每步全序列重算」的输出**逐 token 完全相同**。\n> 这条 `assert` 证明 cache 是纯加速、不改变语义。\n\n再附一个采样 demo：固定随机种子，展示 temperature / top-k / top-p 怎么改变生成的多样性。\n\n## ✅ 盲讲检查点\n\n1. 缓存的是 Q、K、V 里的哪些？为什么 Q 不用缓存？\n2. 没有 cache 时，生成第 t 个 token 是 `O(?)`；有 cache 后是 `O(?)`？为什么？\n3. prefill 和 decode 两个阶段各干嘛？\n4. 为什么「贪心 + cache」必须等于「贪心 + 每步重算」？\n5. temperature / top-k / top-p 各自改变了什么？greedy 为什么容易复读？\n6. `n_new > 1` 时 mask 长什么样？为什么 prefill 和逐 token decode 是同一个函数的两个特例？\n7. 带 cache 时 rope 的 cos/sin 从哪个下标开始取？取错了会发生什么？\n\n> 这把 [`../gqa`](../gqa) 砍 KV 头的显存收益真正兑现了。2025 支线由此出发：\n> [`../mla`](../mla) 把 cache 再砍一个量级，[`../specdec`](../specdec) 直接复用这里的\n> `decode_step`。moe / bpe 进阶仍在 [`../`](..)。\n", "code": "", "code_file": null, "zone": "inference", "qwen": "推理 KV 缓存", "replaces": "每步重算", "who": "所有自回归推理"}, {"key": "llm/localattn", "name": "localattn", "title": "llm/localattn — 滑窗注意力 + local/global 混合", "oneliner": "full causal：每个 token 看全部历史，score `O(L²)`、KV cache `∝ L`。滑窗：只看最近 `W` 个 →", "mastery": "spec", "readme": "# llm/localattn — 滑窗注意力 + local/global 混合\n\n> **📌 一手出处 / official reference**\n> - 滑窗 *Mistral 7B* — Jiang et al., 2023 · [arXiv:2310.06825](https://arxiv.org/abs/2310.06825)（更早：Longformer [2004.05150](https://arxiv.org/abs/2004.05150)）\n> - attention sink *Efficient Streaming Language Models with Attention Sinks* — Xiao et al., ICLR 2024 · [arXiv:2309.17453](https://arxiv.org/abs/2309.17453)\n> - local:global 调度 *Gemma 3 Technical Report* — 2025 · [arXiv:2503.19786](https://arxiv.org/abs/2503.19786)（5:1，local W=1024）；GPT-OSS（交替 + 每头可学 sink）\n> - 参考实现 [mistralai/mistral-inference](https://github.com/mistralai/mistral-inference)（rolling buffer）、[mit-han-lab/streaming-llm](https://github.com/mit-han-lab/streaming-llm)\n\n> 学习笔记 + 复现 spec。目标：复现完 [`localattn.py`](localattn.py) 后，能讲清\n> **「为什么大多数层只看最近 W 个 token 也不丢长程能力；streaming 时开头几个 token 为什么删不得」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\nfull causal：每个 token 看全部历史，score `O(L²)`、KV cache `∝ L`。滑窗：只看最近 `W` 个 →\nscore `O(L·W)`、cache **封顶 W**（rolling buffer）。现代模型不是全换，而是**调度**：大多数层\nlocal、每隔几层一个 global 层保长程（Gemma 3 是 5:1）。\n\n## 🎯 反直觉 1 ｜ 先猜：每层只看最近 W 个，「第 1 页的指令」还能影响第 100 页吗？靠什么？\n\n**答案：能——单层感受野是 W，但 L 层接力叠出 ≈ L×W，和 CNN 感受野同构。**\n\n```python\nmask = torch.triu(ones, diagonal=1)        # 未来看不见（causal，原有）\nmask |= (i - j) >= W                       # === DIFF vs classic：太久以前也看不见 ===\n```\n\n单层感受野是 W，但第 2 层的位置 t 读的是第 1 层位置 t−W+1..t 的输出，而那些位置各自又看过更早\n的 W 个——**L 层堆出 ≈ L×W 的理论感受野**，和 CNN 感受野同构。信息能传，只是要走多层接力。\n\n## 🎯 反直觉 2：local/global 调度——cache 的大头换人\n\n全 local：极省，但「第 1 页的指令」这类硬长程要走几十层接力，容易丢。全 global：贵。\n混合之后 KV cache 的大头从「所有层 × L」变成「global 层数 × L」（local 层封顶 W）：\n\n```\n32 层全 global, L=128k:    32 × 128k\nGemma3 式 5:1, W=1024:     ~5 × 128k + 27 × 1024     ← 长上下文 cache 砍 ~6×\n```\n\n注：Gemma 3 还给两种层配不同 rope base（local 10k / global 1M——波长要配窗口尺度）。这和\n[`../ref/nano.py`](../ref/nano.py) 的单一 rope buffer 冲突，toy 统一 base 即可，README 讲清差异。\n\n## 🎯 反直觉 3 ｜ 先猜：为什么偏偏是开头几个 token 删不得？它们语义上有那么重要吗？\n\n**答案：跟语义无关——它们是 softmax 的泄压阀（sink），删掉后所有行的分布同时突变。**\n\nstreaming 时 cache 满了，直觉是把最老的 token 踢掉。实测一踢前几个 token，PPL 立刻爆炸。\n原因：softmax 每行必须和为 1，当一个位置「没什么可注意的」时，大量概率质量习惯性堆在开头几个\ntoken 上（sink）。删掉 sink，所有行的分布同时突变。解法：**永远保留前几个 token**、其余滑窗。\nGPT-OSS 给每个头学一个 sink logit，是同一机制的参数化版本。\n\n## 你要复现的目标（TODO）\n\n文件：`localattn.py`。装配兼容性：给 [`../ref/nano.py`](../ref/nano.py) 的 `GQA / ModernBlock`\n加一个 `window=None` 参数（None = global），`NanoLLM` 接一个 per-layer schedule（如 `[W,W,W,None]`）。\n\n```python\ndef local_causal_mask(L, window=None):     # [L, L] bool；window=None 退化为纯 causal\nclass GQA(nn.Module):\n    def __init__(self, d, n_heads, n_kv_heads, window=None): ...\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **`local_causal_mask(L, window)` 单测**：写之前先在纸上画 L=6, W=3 的 mask。\n   断言：每行可见位置数 ≤ min(W, 行号+1)；`window=None` 时与纯 causal 完全相等。\n2. **window 接进 GQA**：只动 mask 一处。断言 `window=None` 时输出和原版逐元素一致。\n3. **per-layer schedule 接进 NanoLLM**（如 `[W,W,W,None]`），训练路径照常能跑。\n4. **感受野梯度实验**：注意 embedding 查表不可导，**直接喂连续输入**——堆 1 层 / 2 层\n   block（不要整个 LM），`x = randn(1, L, d, requires_grad=True)`，\n   `out[0, t].sum().backward()`，看 `x.grad[0, t−W]` 的范数。跑之前先预测两组结果。\n\n## ⭐ 必做的 sanity\n\n1. mask 断言：每行可见位置数 ≤ min(W, 行号+1)；`window=None` 时与纯 causal mask 完全相等。\n2. **感受野断言**（机制 1 的直接证据）：随机权重模型，输出位置 t 对输入位置 t−W 的梯度——\n   1 层时严格为 0，叠 2 层后非 0。\n3. （可选）sink 观察：hook 一个训练过的 nano 的 attention，打印各列平均注意力——位置 0 显著高于均匀。\n\n## ✅ 盲讲检查点\n\n1. 滑窗 mask 比 causal 多哪一行？单层 / L 层感受野各是多少？和什么同构？\n2. local 层的 KV cache 为什么封顶 W？（rolling buffer 怎么转）\n3. 混合调度下 cache 的大头是谁？Gemma 3 的比例和窗口是多少？\n4. 纯滑窗 streaming 为什么 PPL 爆炸？sink 的「泄压阀」解释？\n5. 为什么 local 层 rope base 小、global 层大？\n6. 全 local 为什么不行？「指令在第 1 页」这类依赖发生了什么？\n\n> 下一站 [`../specdec`](../specdec)：结构件讲完了，最后一块是纯推理算法。\n", "code": "", "code_file": null, "zone": "inference", "qwen": "局部 / 滑窗注意力", "replaces": "全 O(n²) 注意力", "who": "长上下文 · Qwen ViT 也用"}, {"key": "llm/moe", "name": "moe", "title": "llm/moe — Mixture of Experts", "oneliner": "MoE replaces one dense FFN with many parallel FFNs plus a router. For each token, the router scores all experts, keeps only the top-k, and the token is evaluate", "mastery": "explained", "readme": "# llm/moe — Mixture of Experts\n\nMoE replaces one dense FFN with many parallel FFNs plus a router. For each token, the router\nscores all experts, keeps only the top-k, and the token is evaluated by those experts only; the\noutputs are mixed by the router weights. The expert itself is not new machinery here: each one is\nthe same [`../swiglu`](../swiglu) FFN, instantiated with its own parameters. The trick is that\ncapacity and compute split apart. Total parameters grow with the number of experts `E`, while the\nper-token FFN work grows only with `k`. Mixtral-style top-2 routing is the standard example:\nmany experts live in memory, but each token activates only two.\n\n> **References** — Shazeer et al., *Outrageously Large Neural Networks: The Sparsely-Gated\n> Mixture-of-Experts Layer*, 2017 ([arXiv:1701.06538](https://arxiv.org/abs/1701.06538)) ·\n> Fedus et al., *Switch Transformers*, 2021 ([arXiv:2101.03961](https://arxiv.org/abs/2101.03961)) ·\n> Jiang et al., *Mixtral of Experts*, 2024 ([arXiv:2401.04088](https://arxiv.org/abs/2401.04088)).\n\n```\ndense FFN:  x ─────────────────────► SwiGLU ─────────────► out\n\nMoE FFN:    x ─► router ─► top-k ─┬► expert 3 (SwiGLU) ─┐\n                                  └► expert 7 (SwiGLU) ─┴► weighted sum ─► out\n                         all other experts are skipped for this token\n```\n\nThe router is a tiny linear layer `d → E`, followed by `softmax` and `topk`. With `top_k > 1`, the\nkept weights are renormalized inside the top-k set, so the selected expert outputs form a convex\nmixture. The implementation is deliberately the slow, readable dispatch: flatten `[B, L, d]` into\ntokens, loop over experts, gather the tokens assigned to that expert, run one batched SwiGLU call,\nand scatter-add the weighted result. It is the same computation a fused dispatch kernel would do,\njust written so the routing is visible.\n\nThe failure mode is router collapse. If the main task loss alone makes one expert slightly better,\nthe router sends more tokens there, that expert trains faster, and the loop reinforces itself while\nother experts starve. The Switch-style auxiliary loss pushes router probability toward actual\nusage balance:\n\n```\nf_i   = fraction of top-k slots assigned to expert i      # hard count, no gradient\nP_i   = mean router probability for expert i              # differentiable\nL_aux = E · Σ_i f_i P_i\n```\n\nUniform routing gives `L_aux ≈ 1`; collapse toward one expert raises it toward `E`. The gradient\nflows through `P_i`, while `f_i` tells the loss which experts are overloaded.\n\n## Experiment (`python moe.py`)\n\nA `d=64`, `E=8`, `top_k=2` MoE preserves the token shape and routes every token to exactly two\ndistinct experts:\n\n```\nshape  (4, 16, 64) --MoE--> (4, 16, 64)\n```\n\nAgainst one dense SwiGLU expert, the parameter/FLOP split is visible:\n\n```\n                  params  FFNs/token\ndense SwiGLU      32,640           1\nMoE E=8 k=2      261,632           2     # params x8.0, FLOPs x2\n```\n\nThe router is negligible next to the experts, so total parameters are almost exactly `E×` the\ndense FFN. But each token evaluates only `k` experts, so FFN compute is `k×`, independent of `E`.\nThat is the whole MoE bargain: more capacity in memory, sparse activation per token.\n\nThe script then trains the same toy regression task twice, once with no auxiliary loss and once\nwith `0.01 · L_aux`. Inputs share a common offset, which makes collapse easy to trigger:\n\n```\nexpert usage after 300 steps (uniform = 12.5%)\n                expert      0      1      2      3      4      5      6      7\n           no aux loss   0.0%  50.0%   0.0%   0.0%  50.0%   0.0%   0.0%   0.0%\n        aux loss x0.01  11.3%  13.3%  14.9%  11.7%   9.6%  17.1%  11.6%  10.5%\n```\n\nWithout the auxiliary loss, six experts receive no traffic. With it, usage is not perfectly flat,\nbut every expert stays alive. The point of the experiment is not quality; it isolates the routing\nmechanism and the load-balance pressure that keeps the extra parameters trainable.\n", "code": "import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport sys, pathlib\n\nsys.path.insert(0, str(pathlib.Path(__file__).resolve().parents[1]))  # put llm/ on the path\nfrom swiglu.swiglu import SwiGLU\n\n\nclass MoE(nn.Module):\n    def __init__(self, d, n_experts, top_k, hidden=None):\n        super().__init__()\n        self.n_experts, self.top_k = n_experts, top_k\n        self.router = nn.Linear(d, n_experts, bias=False)        # tiny vs the experts\n        self.experts = nn.ModuleList(SwiGLU(d, hidden) for _ in range(n_experts))\n\n    def forward(self, x):                                        # [B, L, d] -> [B, L, d]\n        shape = x.shape\n        x = x.reshape(-1, shape[-1])                             # [N, d] tokens\n        gate = self.router(x).softmax(-1)                        # [N, E]\n        weight, idx = gate.topk(self.top_k, dim=-1)              # [N, k] each\n        if self.top_k > 1:                                       # renormalize the top-k weights\n            weight = weight / weight.sum(-1, keepdim=True)        # (Mixtral); top-1 keeps raw gate\n        #                                                          prob, else router loses its grad\n\n        out = torch.zeros_like(x)\n        for e in range(self.n_experts):                          # token never touches the others\n            tok, slot = (idx == e).nonzero(as_tuple=True)\n            if tok.numel():\n                out[tok] += weight[tok, slot, None] * self.experts[e](x[tok])\n\n        # load-balance aux loss (Switch-style): E * Σ_e f_e·P_e, =1 when uniform\n        f = F.one_hot(idx, self.n_experts).float().mean((0, 1))  # fraction of slots routed to e\n        P = gate.mean(0)                                         # mean router prob for e\n        aux = self.n_experts * (f * P).sum()\n        return out.reshape(shape), aux, idx\n\n\ndef usage(idx, n_experts):\n    return F.one_hot(idx, n_experts).float().mean((0, 1))\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    d, E, k = 64, 8, 2\n    moe = MoE(d, E, k)\n    x = torch.randn(4, 16, d)\n    out, aux, idx = moe(x)\n\n    print(f\"shape  {tuple(x.shape)} --MoE--> {tuple(out.shape)}\")\n    assert out.shape == x.shape\n    assert idx.shape == (4 * 16, k)                          # every token: exactly k experts\n    assert (idx.sort(-1).values.diff(dim=-1) != 0).all()     # ...and they are distinct\n\n    dense = SwiGLU(d)\n    nparams = lambda m: sum(p.numel() for p in m.parameters())\n    print(f\"\\n{'':14}{'params':>10}{'FFNs/token':>12}\")\n    print(f\"{'dense SwiGLU':14}{nparams(dense):>10,}{1:>12}\")\n    print(f\"{'MoE E=8 k=2':14}{nparams(moe):>10,}{k:>12}     # params x{nparams(moe) / nparams(dense):.1f}, FLOPs x{k}\")\n\n    # router collapse: same toy task with and without the aux loss. Inputs share a\n    # common component (+1), so without pressure all tokens rush to the same experts.\n    results = {}\n    for aux_coef in (0.0, 0.01):\n        torch.manual_seed(0)\n        moe = MoE(d, E, k)\n        target = nn.Sequential(nn.Linear(d, d), nn.Tanh(), nn.Linear(d, d))\n        opt = torch.optim.AdamW(moe.parameters(), lr=1e-2)\n        for step in range(300):\n            x = torch.randn(8, 16, d) + 1.0\n            out, aux, idx = moe(x)\n            loss = F.mse_loss(out, target(x).detach()) + aux_coef * aux\n            opt.zero_grad(); loss.backward(); opt.step()\n        with torch.no_grad():\n            _, _, idx = moe(torch.randn(256, 16, d) + 1.0)   # big fresh batch\n        results[aux_coef] = usage(idx, E)\n\n    print(f\"\\nexpert usage after 300 steps (uniform = {1 / E:.1%})\")\n    print(f\"{'expert':>22}\" + \"\".join(f\"{e:>7}\" for e in range(E)))\n    for coef, u in results.items():\n        name = \"no aux loss\" if coef == 0 else f\"aux loss x{coef}\"\n        print(f\"{name:>22}\" + \"\".join(f\"{p:>7.1%}\" for p in u))\n    assert results[0.0].max() > 0.3                          # collapse: winners take (almost) all\n    assert results[0.0].min() < 0.01                         # ...and losers starve\n    assert results[0.01].min() > 0.5 / E                     # aux loss: nobody starves\n", "code_file": "moe.py", "zone": "language", "qwen": "MoE 稀疏 FFN", "replaces": "dense FFN", "who": "Qwen-MoE · DeepSeek"}, {"key": "llm/mla", "name": "mla", "title": "llm/mla — Multi-head Latent Attention", "oneliner": "[GQA](../gqa) 省 cache 的思路是「K/V 少存几个头」；MLA 是「**K/V 根本不存**」——把 x 先压成一个", "mastery": "spec", "readme": "# llm/mla — Multi-head Latent Attention\n\n> **📌 一手出处 / official reference**\n> - 论文 *DeepSeek-V2: A Strong, Economical, and Efficient Mixture-of-Experts Language Model* — DeepSeek-AI, 2024 · [arXiv:2405.04434](https://arxiv.org/abs/2405.04434)（§2.1）\n> - 沿用：DeepSeek-V3 ([2412.19437](https://arxiv.org/abs/2412.19437))、DeepSeek-R1、Kimi K2\n> - 官方实现 [deepseek-ai/DeepSeek-V2](https://huggingface.co/deepseek-ai/DeepSeek-V2) 的 `modeling_deepseek.py`（`DeepseekV2Attention`）\n\n> 学习笔记 + 复现 spec。目标：复现完 [`mla.py`](mla.py) 后，能讲清\n> **「cache 里存的为什么可以既不是 K 也不是 V；RoPE 怎么逼出一个 decoupled 子空间」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n[GQA](../gqa) 省 cache 的思路是「K/V 少存几个头」；MLA 是「**K/V 根本不存**」——把 x 先压成一个\n低秩 latent `c_kv`（无头数维度），cache 只存它；K/V 用时再从 `c_kv` 上投影出来。而且解码时连\n「投影出来」这步都能省：上投影矩阵可以**吸收**进 q 侧，attention 直接在 latent 空间里做。\n\n## === DIFF vs GQA ===\n\n|  | GQA | MLA |\n|---|---|---|\n| cache 内容 | K, V | latent `c_kv` + 共享 `k_rope` |\n| cache 形状 | `[B, H_kv, t, d_k]` ×2 | `[B, t, d_c]` + `[B, 1, t, d_rope]`（**无头数维**）|\n| 省显存的代价 | 砍 KV 头数 → 表达力受损 | 低秩压缩，**所有头保留**（论文：质量 ≥ MHA）|\n| 每 token 每层 cache | `2·H_kv·d_k` | `d_c + d_rope`（V2 取 512+64 → MHA 的 ~7%）|\n\n## 🎯 反直觉 1 ｜ 先猜：cache 全头共用一份——这跟 MQA 的共享是一回事吗？（想 30 秒）\n\n**答案：不是。MQA 共享的是 K/V 本身（视角被砍），MLA 共享的只是压缩存储，每头各自解读。**\n\ncache 里的 `c_kv` 所有头共用一份（看起来像 MQA），但每个头有自己的上投影 `W_uk`——吸收之后\n等价于每个头拿自己的方向在 latent 空间里「看」。MQA 是真共享 K/V（表达力被砍），MLA 是共享\n**压缩存储**、每头各自解读。\n\n```\n朴素视角:  score = q_nopeᵀ · (W_uk c)          ← 解码时要先把 K 展开\n吸收视角:  score = (W_ukᵀ q_nope)ᵀ · c         ← W_uk 挪到 q 侧预乘，K 永不展开\n```\n\n## 🎯 反直觉 2 ｜ 一点一点推：RoPE 怎么把设计逼进 decoupled 子空间\n\n```\n想压缩 KV cache\n  → 低秩 latent + 把 W_uk 吸收进 q 侧\n  → 但 RoPE 是位置相关旋转：score = qᵀ R(m−n) (W_uk c)\n  → R 卡在中间且随位置变，qᵀRW_uk 不再有可预乘的常矩阵 → 吸收失效\n  → 解法：每个头劈两段——d_nope 大头不加 rope、走吸收；\n         d_rope 小尾巴单独投影、加 rope、所有头共享一份 k_rope、直接缓存\n\nscore = (q_nope·k_nope + q_rope·k_rope) / √(d_nope + d_rope)\n```\n\n这是一个工程冲突的解，不是数学美学：d_rope 那一小段就是「为位置信息付的 cache 税」。\n\n## 数据流（`mla.py` 的 shape walk，toy：d=64, H=4, d_c=16, d_nope=16, d_rope=8）\n\n| 步骤 | shape | 说明 |\n|---|---|---|\n| `c_kv = w_dkv(x)` | `[B, L, 16]` | 下投影，**这就是 cache 的主体** |\n| `k_nope = w_uk(c_kv)` | `[B, 4, L, 16]` | 每头各自上投影（解码时被吸收，不实存）|\n| `v = w_uv(c_kv)` | `[B, 4, L, 16]` | 同上 |\n| `k_rope = rope(w_kr(x))` | `[B, 1, L, 8]` | **所有头共享**，cache 的另一半 |\n| `q → (q_nope, q_rope)` | `[B,4,L,16]+[B,4,L,8]` | q_rope 加 rope |\n| scores | `[B, 4, L, L]` | 两段点积相加，除 √(16+8) |\n\n## 你要复现的目标（TODO）\n\n文件：`mla.py`。**GQA 的 drop-in replacement**：签名保持 `forward(x, cos, sin)`，可直接插回\n[`../ref/nano.py`](../ref/nano.py) 的 `ModernBlock` 槽位——唯一区别是 cos/sin 按 `d_rope` 构建。\nrope 一律复用 [`../rope`](../rope) 的 `build_rope_cache / apply_rope`，**不要重写旋转**。\n（V2 里 q 也走低秩压缩，但那省的是参数/激活、不省 cache——toy 可省略。）\n\n```python\nclass MLA(nn.Module):\n    # w_dkv(d→d_c), w_uk/w_uv(d_c→H·d_nope), w_kr(d→d_rope),\n    # w_q(d→H·(d_nope+d_rope)), w_o(H·d_v→d)\n    def forward(self, x, cos, sin):   # cos/sin 按 d_rope 构建\n```\n\n吸收那步的具体写法（卡住时照这个）：`nn.Linear(d_c, H*d_nope)` 的 weight 是\n`[H*d_nope, d_c]`，`view` 成 `[H, d_nope, d_c]` 记作 `Wuk`，则\n\n```python\nq_eff       = einsum('bhln,hnc->bhlc', q_nope, Wuk)      # W_ukᵀ 预乘进 q 侧\nscore_nope  = einsum('bhlc,btc->bhlt', q_eff, c_kv)      # 直接打在 latent 上，K 永不展开\n# 朴素路（对照用）: k_nope = einsum('btc,hnc->bhtn', c_kv, Wuk); score = q_nope @ k_nopeᵀ\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **朴素版**：照上面 shape walk 表逐行写（k_nope/v 显式展开），先不加 rope，跑通 causal\n   attention，断言表里每行的 shape。\n2. **吸收版**：换成 `q_eff` 路径，断言两条路 score `allclose`（⭐ 的第 1 条）。\n3. **decoupled rope**：加上 q_rope / 共享 k_rope，两段分数相加、除 `√(d_nope+d_rope)`。\n   断言 cache 双件（`c_kv`、`k_rope`）都没有 H 维（⭐ 的第 2 条）。\n4. **定价表**：跑之前先手算预测 MLA(512+64) 那行是多少 GiB，再跑断言核对（⭐ 的第 3 条）。\n\n## ⭐ 必做的 sanity\n\n1. **吸收等价**（signature property）：nope 段的 score 用「展开 K」和「`W_ukᵀq` 预乘到 q 侧」\n   两条路各算一遍，`assert allclose`；再演示 rope 段为什么不能同样吸收。\n2. cache 形状断言：`c_kv` 与 `k_rope` 都**没有 H 维**。\n3. 定价表：扩展 [`../ref/gqa.py`](../ref/gqa.py) 的 `kv_cache_bytes` 7B 表，加一行 MLA——\n   MHA 4.00 GiB → GQA(8) 1.00 → MQA 0.12 → **MLA(512+64) 0.28**。注意 MLA 比 MQA 存得略多，\n   但质量 ≥ MHA 而不是被砍——省显存第一次不拿表达力换。\n4. （进阶，做完 [`../kvcache`](../kvcache) 后）latent-cache 增量贪心 == 全序列重算，逐 token 相同。\n\n## ✅ 盲讲检查点\n\n1. MLA 的 cache 存哪两样？形状？为什么没有头数维？\n2. 「吸收」是哪个矩阵预乘到哪？为什么解码时 K 永不展开？\n3. RoPE 为什么破坏吸收？decoupled 怎么拆维度？\n4. `k_rope` 为什么可以全头共享？\n5. 和 MQA 都「共享一份 cache」，本质区别是什么？\n6. V2 尺寸下 MLA cache 大约是 MHA 的百分之几？\n\n> 下一站 [`../localattn`](../localattn)：另一条省 cache 的路——大多数层干脆只看一个窗口。\n", "code": "", "code_file": null, "zone": "language", "qwen": "MLA 潜在注意力", "replaces": "MHA / GQA 的 KV", "who": "DeepSeek-V2/V3"}, {"key": "llm/specdec", "name": "specdec", "title": "llm/specdec — Speculative Decoding（推理算法）", "oneliner": "自回归解码每步要等上一个 token，大模型每吐 1 个 token 就得把全部权重读一遍（memory-bound）。", "mastery": "spec", "readme": "# llm/specdec — Speculative Decoding（推理算法）\n\n> **📌 一手出处 / official reference**\n> - 论文 *Fast Inference from Transformers via Speculative Decoding* — Leviathan et al., ICML 2023 · [arXiv:2211.17192](https://arxiv.org/abs/2211.17192)；同期 *Accelerating Large Language Model Decoding with Speculative Sampling* — Chen et al., 2023 · [arXiv:2302.01318](https://arxiv.org/abs/2302.01318)\n> - MTP（train-time 孪生）*DeepSeek-V3* · [arXiv:2412.19437](https://arxiv.org/abs/2412.19437) §2.2\n> - 参考实现 [pytorch-labs/gpt-fast](https://github.com/pytorch-labs/gpt-fast)、HF transformers 的 assisted generation\n\n> 学习笔记 + 复现 spec。目标：复现完 [`specdec.py`](specdec.py) 后，能讲清\n> **「小模型打草稿、大模型一次 forward 并行验收，为什么输出分布和大模型逐 token 完全一致」**。\n> 和 [`../kvcache`](../kvcache) 一样，这是**推理算法**、不是结构件——模型一个权重都不改。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n自回归解码每步要等上一个 token，大模型每吐 1 个 token 就得把全部权重读一遍（memory-bound）。\n但**验证比生成便宜**：给定一段现成 token，一次 forward 并行拿到每个位置的分布（teacher forcing\n在推理时的回响）。于是：小 draft 自回归吐 k 个候选 → target **一次** forward 验证 → 接受最长\n正确前缀，拒绝处按修正分布重采样。\n\n## 🎯 盯死的反直觉机制：加速是免费的——分布逐 token 不变\n\n```\n对 draft 提议的 token x:   以 min(1, p_target(x) / p_draft(x)) 接受\n拒绝时:                    从 norm(max(0, p_target − p_draft)) 重采样\n```\n\n数学保证（Leviathan et al. 附录 Theorem 1，两段代数，值得亲手验一遍）：每个 token 的边际分布\n**恰好等于**直接从 target 采样——不是近似、不是 lossy 加速。贪心情形退化得很直白：逐个比较\ndraft 和 target 的 argmax 是否一致。\n\n加速账：target 的 forward 次数从 n 变 ~n/(平均接受长度+1)，省的是**读权重的次数**（memory-bound\n的根源），FLOPs 反而略增——又一次「decode 瓶颈是带宽不是算力」的兑现（同 [`../gqa`](../gqa) 的论证）。\n\n## === 兼容契约：这就是 kvcache 要求 n_new 接口的原因 ===\n\n```\n验证步 = decode_step(target, draft 的 k+1 个 token, cache)    ← 一次喂 n_new = k+1\n拒绝时 = cache 回滚（truncate 到接受位置 t），target 和 draft 双方都要\n```\n\n[`../kvcache`](../kvcache) 的 `decode_step` 必须支持 `[B, n_new]` 与 cache truncate，否则这里返工。\n\n## 位置簿记（实现的真正难点，先看懂这张表再动手）\n\n不变量：**每轮开始时，双方 cache 都恰好覆盖「当前前缀去掉最后一个 token」，最后那个 token\n（上一轮刚定下的）还没喂给任何一方。** 设 k=3、当前前缀 `… x_T`（长 T）：\n\n| 阶段 | 喂什么 | cache 长度 | 产出 |\n|---|---|---|---|\n| ① draft 起草 | `x_T`、`d₁`、`d₂` 逐个 | T−1 → T+2 | 提议 `d₁ d₂ d₃`，记录每步分布 q₁..q₃ |\n| ② target 验收 | `[x_T, d₁, d₂, d₃]` 一次 forward（n_new=4）| T−1 → T+3 | 4 个位置的分布 p₁..p₄ |\n| ③ 逐个判定 | — | — | i=1..3：`u < p_i(d_i)/q_i(d_i)` 则接受 |\n\n对齐关系：**第 i 个 p 验收第 i 个 d**——p_i 的条件是 `…x_T d₁…d_{i−1}`，恰好就是 draft 提出\nd_i 时的条件；p₄ 是「全部通过时白送的下一个分布」。两种收尾：\n\n- **在第 m 个拒绝**：产出 `d₁..d_{m−1}` + `y ~ norm(max(0, p_m − q_m))`。新前缀长 T+m，\n  y 成为新的「未喂 token」→ **双方** `cache.truncate(T+m−1)`。\n- **全部接受**：白送 `y ~ p₄`，产出 `d₁ d₂ d₃ y`，新前缀长 T+4。target cache 已是 T+3 不用动；\n  draft cache 只到 T+2（`d₃` 它自己没喂过）——下一轮开头把缺的尾巴 `[d₃, y]` 一次喂入\n  （n_new=2）。`decode_step` 支持任意 n_new 在这里第二次兑现。\n\n## draft 从哪来（MTP diff）\n\n| 方案 | 做法 | 代价 |\n|---|---|---|\n| 独立小模型 | 同 tokenizer 训一个小的 | 要多养一个模型 |\n| **MTP 头**（DeepSeek-V3）| target 训练时就多挂头预测 t+2, t+3… | 推理时草稿免费，训练信号还更密 |\n\n## 你要复现的目标（TODO）\n\n文件：`specdec.py`。在同一份文本上训两个 NanoLLM——target（4 层）+ draft（2 层），复用\n[`../kvcache`](../kvcache) 的 `decode_step / sample`。\n\n```python\n@torch.no_grad()\ndef speculative_generate(target, draft, prompt_ids, max_new, k=4):\n    # 循环: draft 自回归吐 k 个 → target 一次 forward 验证 →\n    #       接受前缀 / 拒绝处重采样 → 双方 cache 回滚到接受位置\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **训两个模型**：同语料、同 tokenizer，target 4 层 / draft 2 层，训练脚本直接复用\n   [`../nano`](../nano) 的。检查：draft 单独贪心生成也大致通顺（它太烂的话后面接受率没法看）。\n2. **贪心版 specdec**：判定退化为 `argmax(p_i) == d_i`，没有重采样（y 也取 argmax），\n   位置簿记和完整版完全相同。断言：输出 == target 单独贪心解码，逐 token 相同。\n   ← 主断言先在最简情形拿到，簿记 bug 全在这一级暴露。\n3. **完整 rejection sampling 版**：换上接受/拒绝公式。自查：温度 → 0 时行为收敛回第 2 级。\n4. **加速账**：打印平均接受长度、target forward 次数 vs 普通 decode 的 n。\n5. **对照实验**：draft 换成随机初始化 → 接受长度跌到 ~0，直观看到「draft 质量 = 加速比」。\n\n## ⭐ 必做的 sanity\n\n1. **等价性（贪心）**：`speculative_generate` 贪心输出 == target 单独贪心解码，逐 token assert。\n2. 加速账：打印平均接受长度、target forward 次数 vs 普通 decode 的 n——draft 训得越像 target，\n   接受越长。\n3. 对照实验：draft 换成随机初始化（没训过）→ 接受长度跌到 ~0，直观演示「draft 质量 = 加速比」。\n\n## ✅ 盲讲检查点\n\n1. 为什么验证 k 个 token 只要一次 forward？\n2. 接受/拒绝规则是什么？为什么最终分布和 target 完全一致？\n3. 省的是 FLOPs 还是权重读取次数？为什么 decode 阶段这笔账成立？\n4. draft 太差 / 太大分别发生什么？\n5. 在第 m 个 draft 处拒绝时，双方 cache 各 truncate 到多少？全接受时 draft 的 cache 为什么还缺一个 token、下一轮怎么补？\n6. MTP 和 specdec 什么关系？为什么说它让草稿「免费」？\n\n> llm 支线收尾。回 [`../`](..) 总览，或转 [`../../cv/vl`](../../cv/vl) 看语言骨干怎么接入视觉 token。\n", "code": "", "code_file": null, "zone": "inference", "qwen": "投机解码", "replaces": "逐 token 解码", "who": "推理加速"}, {"key": "cv/tokbudget", "name": "tokbudget", "title": "cv/tokbudget — 视觉 token 预算：长视频 MLLM 的总账本", "oneliner": "成本三因子，**连乘**：", "mastery": "spec", "readme": "# cv/tokbudget — 视觉 token 预算：长视频 MLLM 的总账本\n\n> **📌 一手出处 / official reference**\n> - *An Image is Worth 1/2 Tokens After Layer 2*（FastV）— Chen et al., ECCV 2024 · [arXiv:2403.06764](https://arxiv.org/abs/2403.06764)——「视觉 token 的算力一半是浪费」的定量证据\n> - *Qwen2-VL* — Wang et al., 2024 · [arXiv:2409.12191](https://arxiv.org/abs/2409.12191)——dynamic resolution + 2×2 merge + M-RoPE，预算链条的工业范本\n> - 单价依据：[`../../llm/gqa`](../../llm/gqa) 的 KV-cache 测算、[`../../llm/kvcache`](../../llm/kvcache)\n\n> 地图 + 定价组件，**没有训练**。复现 `budget.py` 是纯算术的成本计算器（参照\n> [`../../llm/ref/gqa.py`](../../llm/ref/gqa.py) 给 7B KV 定价的做法）。读完 + 算完，能讲清\n> **长视频 MLLM 的钱花在链条哪一段、每类压缩机制各管哪一段**。这是支线四个组件的总图。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 完整成本链条（先把链画出来，再谈压缩）\n\n```\nframe sampling ─► vision encoder ─► token merge ─► projector ─► 进 LLM 序列 ─► prefill ─► KV cache / memory\n（哪些帧进）      （分辨率×patch）   （每帧几个 token）            （position id）  （∝ tokens²）（∝ tokens）\n framesample/         vit/             tokmerge/        vl/         mrope/        ../../llm/kvcache\n```\n\n成本三因子，**连乘**：\n\n```\n总 token  = 帧数 × 每帧 token 数\nKV 显存   = 总 token × 每 token 单价（7B 级 GQA(8)、d_k=128、32 层、bf16 ≈ 128 KiB/token）\nprefill   ∝ 总 token²（attention 项）\n```\n\n## 算几笔账（`budget.py` 要打印的表）\n\n10 分钟视频、336px、patch 14（≈ LLaVA-1.5 的 576 token/帧）：\n\n| 配置 | 每帧 token | 总 token | 仅 KV cache |\n|---|---|---|---|\n| 1 fps，不压 | 576 | 345,600 | **42.2 GiB** |\n| + 2×2 merge（[`tokmerge`](../tokmerge)） | 144 | 86,400 | 10.5 GiB |\n| + 降到 0.5 fps | 144 | 43,200 | 5.3 GiB |\n| + 帧预算 64（[`framesample`](../framesample)） | 144 | 9,216 | **1.1 GiB** |\n\n37× 的削减没有一步来自某个单独的「压缩算法」，是**链条上每段各砍一刀的连乘**。这也是为什么\n长视频 VLM 的论文散落在五个不同环节——它们在分同一张账单。\n\n## 谱系：五类机制、各管一段\n\n| 机制 | 代表 | 管哪段 | 这里的 spec |\n|---|---|---|---|\n| frame sampling | uniform / AKS [2502.21271](https://arxiv.org/abs/2502.21271) / VideoAgent [2403.10517](https://arxiv.org/abs/2403.10517) | encoder 之前 | [`../framesample`](../framesample) |\n| merge / pixel-shuffle | Qwen2-VL 2×2 merge、InternVL pixel shuffle [2404.16821](https://arxiv.org/abs/2404.16821) | encoder 后、进 LLM 前 | [`../tokmerge`](../tokmerge) |\n| query compressor | Flamingo Perceiver [2204.14198](https://arxiv.org/abs/2204.14198)、BLIP-2 Q-Former [2301.12597](https://arxiv.org/abs/2301.12597) | 同上，但输出**固定预算 K** | 本页下文，不立目录 |\n| runtime pruning | FastV [2403.06764](https://arxiv.org/abs/2403.06764)、VisionZip、PyramidDrop | **LLM 内部**，免训练 | [`../tokmerge`](../tokmerge) 选做 |\n| streaming KV / memory | MovieChat [2307.16449](https://arxiv.org/abs/2307.16449) 等 | LLM 后端（历史 token 进固定 memory） | 论文级，到 lab 再读 |\n\n**query compressor 为什么不立目录**：K 个可学习 query 用 cross-attention 把任意多 patch 特征吸进\n固定预算——和 [`../../llm/mla`](../../llm/mla) 的低秩瓶颈同一思想，只是作用在 token 数维度。\n它是 2022–23 的主流（Flamingo / BLIP-2），但 2024–25 的 image VLM 几乎都退回「简单 projector +\nmerge」：固定 K 是信息瓶颈、且比无参 merge 难训。在 per-frame 预算的视频模型里它还活着。\n知道这段兴衰史，比再复现一遍 cross-attention 值钱。\n\n## 🎯 先猜：「视觉 token 很冗余，随便压 16× 不掉点」——这句话对吗？（想 30 秒）\n\n**答案：错。该省多少不取决于图，取决于任务——冗余度是任务 / 帧 / 区域相关的。**\n\n不要把这条支线学成「视觉 token 冗余 → 随便压」。粗识别\n（主色、场景类别）16× 压缩不掉点；OCR、小目标、grounding 在 4× 就开始崩\n（[`../tokmerge`](../tokmerge) 的双任务实验就是证明）。正确的 research statement 是：\n\n> **Token compression should be adaptive, because visual information density differs across\n> tasks, frames, and regions.**\n\n这正是 adaptive / query-aware compression 这个研究方向的立项理由。\n\n## 你要复现的目标（TODO）\n\n文件：`budget.py`。纯算术，不需要 torch。\n\n```python\ndef visual_token_budget(duration_s, fps, resolution, patch, merge_rate, frame_budget=None,\n                        kv_bytes_per_token=128 * 1024):\n    # 返回 (每帧 token, 总 token, kv_GiB, 相对不压的压缩比)，打印上面的表\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **每帧 token 数**：`(resolution/patch)² / merge_rate²`。手算 336/14 不压 → 先预测再断言（576）。\n2. **总 token + KV 显存**：乘 `kv_bytes_per_token`。先推 128 KiB/token 怎么来（⭐ 第 2 条），\n   再代入。\n3. **复现整张表**：四行配置逐行算，对上 README 的数字。\n4. **连乘断言**（⭐ 第 1 条）：把表里的削减拆成各段之积，验证 37× == 各段连乘。\n\n## ⭐ 必做的 sanity\n\n1. 连乘断言：任意两段压缩率组合，总压缩比 == 各段之积。\n2. 单价断言：128 KiB/token == 2(K,V) × 32 层 × 8 kv-head × 128 d_k × 2 bytes。\n3. 打印一行判断：不压时 42 GiB 仅是 KV，还没算权重和激活——**这条视频塞不进一张 80 GiB 卡**。\n\n## ✅ 盲讲检查点\n\n1. 成本三因子是什么？为什么说是连乘、不是相加？\n2. 128 KiB/token 怎么推出来的？哪个 llm 组件给的？\n3. 五类压缩机制各管链条哪一段？哪些可叠加、哪些互斥？\n4. Q-Former 路线为什么在 image VLM 退潮、又为什么在视频里还活着？\n5. 「16× 压缩不掉点」这句话错在哪？正确的表述是什么？\n\n> 下一站：账本上最上游、也最便宜的一段——[`../framesample`](../framesample)。\n", "code": "", "code_file": null, "zone": "budget", "qwen": "全链 token 账本", "replaces": "凭感觉估 token", "who": "长视频系统设计"}]};
const MC = {explained:'var(--done)', core:'var(--core)', spec:'var(--spec)'};
const ML = {explained:'已实现 · 有实验/讲解', core:'已实现 · core code', spec:'未实现 · spec only'};
const byKey = Object.fromEntries(DATA.components.map(c=>[c.key,c]));

function renderZones(){
  const host = document.getElementById('zones');
  for(const [z,label,desc] of DATA.zones){
    const items = DATA.components.filter(c=>c.zone===z);
    if(!items.length) continue;
    const sec = document.createElement('section'); sec.className='zone';
    sec.innerHTML = '<div class="zh"><b>'+label+'</b><span>'+desc+'</span></div>';
    const grid = document.createElement('div'); grid.className='grid';
    for(const c of items){
      const el = document.createElement('div'); el.className='card'; el.dataset.key=c.key;
      el.innerHTML = '<div class="top"><span class="nm">'+c.key+'</span>'+
        '<i class="dot" style="background:'+MC[c.mastery]+'"></i></div>'+
        '<div class="ol">'+(c.oneliner||c.qwen||'')+'</div>';
      el.onclick=()=>select(c.key);
      grid.appendChild(el);
    }
    sec.appendChild(grid); host.appendChild(sec);
  }
}

function renderProgress(){
  const cs=DATA.components, n=cs.length;
  const k={explained:0,core:0,spec:0};
  cs.forEach(c=>k[c.mastery]++);
  document.getElementById('seg').innerHTML=['explained','core','spec']
    .map(m=>k[m]?'<span style="width:'+(k[m]/n*100).toFixed(1)+'%;background:'+MC[m]+'"></span>':'').join('');
  document.getElementById('cnt').textContent=
    '共 '+n+' 个构件 · 已实现 '+(k.explained+k.core)+' · 未实现/spec '+k.spec+
    ' · join 核心：cv/vl + cv/mrope';
}

let tab='notes';
function select(key){
  document.querySelectorAll('.card').forEach(e=>e.classList.toggle('sel',e.dataset.key===key));
  const c=byKey[key], d=document.getElementById('detail');
  const notes = c.readme ? marked.parse(c.readme) : '<p class="empty">这一格还没有 README</p>';
  const codeHtml = c.code
    ? '<pre class="src"><code class="language-python">'+escapeHtml(c.code)+'</code></pre>'
    : '<p class="empty">这一格还没有实现代码（spec 阶段）</p>';
  d.innerHTML =
    '<h2>'+c.key+'</h2>'+
    '<div class="meta"><i class="dot" style="background:'+MC[c.mastery]+'"></i>'+ML[c.mastery]+
      ' &nbsp;·&nbsp; role：'+(c.qwen||'—')+'</div>'+
    (c.replaces?'<div class="row"><span>取代</span><span>'+c.replaces+'</span></div>':'')+
    (c.who?'<div class="row"><span>在用</span><span>'+c.who+'</span></div>':'')+
    (c.code_file?'<div class="row"><span>代码</span><span>'+c.key+'/'+c.code_file+'</span></div>':'')+
    '<div class="tabs"><button class="tab" data-t="notes">README</button>'+
      '<button class="tab" data-t="code">代码</button></div>'+
    '<div id="pane"></div>';
  d.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.t;paint(notes,codeHtml);});
  paint(notes,codeHtml);
  if(window.innerWidth<880) d.scrollIntoView({behavior:'smooth'});
}
function paint(notes,codeHtml){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));
  const pane=document.getElementById('pane');
  pane.className = tab==='notes'?'md':'';
  pane.innerHTML = tab==='notes'?notes:codeHtml;
  if(tab==='code') pane.querySelectorAll('code').forEach(b=>hljs.highlightElement(b));
}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

renderProgress(); renderZones();
</script>
