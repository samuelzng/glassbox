<script>
const DATA = {"zones": [["language", "llm · 语言骨干", "tokenizer、位置、norm、attention、FFN、nano 组装"], ["vision", "cv · 视觉塔", "pixels / frames → patch tokens；图文预训练目标"], ["join", "VLM 接缝", "projector + splice + multimodal positions"], ["budget", "视觉 token 预算支线", "抽帧、合并、成本账本：控制进 LLM 的视觉序列长度"], ["inference", "LLM 推理支线", "cache、局部注意力、投机解码：服务与长上下文机制"], ["other", "其他 / 未归类", "manifest 未归类的组件"]], "components": [{"key": "cv/vit", "name": "vit", "title": "cv/vit — Vision Transformer", "oneliner": "ViT treats an image patch as a word. Cut the image into a grid of fixed `p×p` patches, flatten each and project it through one linear layer, and the image becom", "mastery": "explained", "readme": "# cv/vit — Vision Transformer\n\nViT treats an image patch as a word. Cut the image into a grid of fixed `p×p` patches, flatten\neach and project it through one linear layer, and the image becomes a sequence of tokens that a\nstandard Transformer encoder consumes exactly like text. The defining move is everything it\n*drops*: the two inductive biases that make a CNN a CNN — locality and translation equivariance —\nare gone, leaving a single image-specific assumption, \"cut into 2-D patches.\" Self-attention has a\nglobal receptive field from the first layer. The trade is blunt — with little data ViT trails CNNs\n(no priors to lean on), with enough data its ceiling is higher: inductive bias is a shortcut on\nsmall data and a ceiling on large data. A learnable `[CLS]` token aggregates the sequence into one\nvector for the classifier; learnable position embeddings supply the order attention is otherwise\nblind to. It is the backbone under CLIP, SigLIP, MAE, and the vision tower of essentially every VLM.\n\n> **References** — Dosovitskiy et al., *An Image is Worth 16×16 Words: Transformers for Image\n> Recognition at Scale*, ICLR 2021 ([arXiv:2010.11929](https://arxiv.org/abs/2010.11929)) · official\n> [google-research/vision_transformer](https://github.com/google-research/vision_transformer) ·\n> reference impl: `vision_transformer.py` in\n> [huggingface/pytorch-image-models](https://github.com/huggingface/pytorch-image-models).\n\n```\nimage   [B, 3, 32, 32]\n   │  patchify (unfold → flatten)      patch 4 → 8×8 = 64 patches, each 3·4·4 = 48\n   ▼\npatches [B, 64, 48]\n   │  Linear(48 → D)  ·  prepend [CLS]  ·  + learnable pos\n   ▼\ntokens  [B, 65, D]\n   │  Transformer encoder × L     (pre-norm · no causal mask · scale 1/√d_head)\n   ▼\n        [B, 65, D]\n   │  take token 0 ([CLS])  →  Linear(D → n_classes)\n   ▼\nlogits  [B, n_classes]\n```\n\nPatchify is `unfold → flatten → Linear`, which is exactly a stride-`p` convolution with a `p×p`\nkernel — written here as `view`+`permute`+`reshape`, no einops. The encoder block is the *classic*\nTransformer, not the modern LLM variant in [`../../llm`](../../llm): `LayerNorm` (not RMSNorm), a\nGELU FFN (not gated SwiGLU), plain multi-head attention (not GQA), and — the one that matters —\n**no causal mask**, so every patch attends to every other. Scores scale by `1/√d_head` (per-head\ndim, not `√D`). The readout is the `[CLS]` output `x[:,0]`; global average pooling over the patch\ntokens works about as well and is what SimpleViT uses. Set `num_classes=0` and the head is dropped —\n`forward` returns the full `[B, N, D]` token sequence, i.e. ViT as a pure encoder / vision tower,\nthe interface MAE, CLIP and VLM connectors consume.\n\n## Experiment (`python vit.py`)\n\nFour non-training assertions — forward plus one backward, no dataset — on a CIFAR-sized config\n(32×32, patch 4 → 64 patches), so it runs instantly:\n\n```\ntokens   64 patches + 1 cls = 65\nshape    (2, 3, 32, 32) --ViT--> (2, 10)    params 545,002\nencoder  (2, 3, 32, 32) --ViT(classes=0)--> (2, 65, 128)\ngrad     56/56 weights receive gradient\npos-emb  zeroing positions changes logits  ->  order matters\n```\n\nEach line pins one property; together they say *patchify, CLS, positions, encoder and head are all\ncorrect and connected*:\n\n- **contract** — an image `(B,3,32,32)` becomes class logits `(B,10)`. The basic shape contract holds.\n- **duality** — with `num_classes=0` the same model returns the token sequence `(B,65,128)` instead\n  of logits: drop the head and ViT *is* a vision tower, the encoder interface that feeds\n  [`../mae`](../mae) / [`../clip`](../clip) / a VLM connector.\n- **wiring** — one backward reaches **56/56** weights. The strongest \"nothing is mis-wired\" probe,\n  and it needs no training: any parameter built but forgotten in `forward` (the CLS token, the\n  position table, a block) surfaces immediately as a zero gradient.\n- **signature** — zeroing `pos_embedding` *must* change the logits, proving the position embedding\n  does real work; without it ViT would treat the patches as an unordered set, since attention alone\n  is permutation-equivariant. At init the table is random noise, so this proves position is *wired\n  in* — that it encodes real 2-D geometry is what training adds.\n\nThis is the **correctness** sanity, not performance. The performance sanity — a few hundred steps on\na CIFAR-10 subset, asserting train accuracy climbs (mechanism works, not chasing SOTA) — is the next\nrung, and the baseline the token-budget ablation builds on.\n\n> Next: [`../mae`](../mae) — pretrain this encoder with no labels by masking patches and\n> reconstructing; the visual-token-budget ablation that rides on it is [`../tokbudget`](../tokbudget).\n", "code": "import torch\nfrom torch import nn\nfrom torch.nn import ModuleList\n\nclass FeedForward(nn.Module):\n    def __init__(self, dim, hidden_dim, dropout = 0.):\n        super().__init__()\n        self.network = nn.Sequential(\n            nn.LayerNorm(dim),\n            nn.Linear(dim, hidden_dim),\n            nn.GELU(),\n            nn.Dropout(dropout),\n            nn.Linear(hidden_dim, dim),\n            nn.Dropout(dropout)\n        )\n    \n    def forward(self, x):\n        return self.network(x)\n    \nclass Attn(nn.Module):\n    def __init__(self, dim, heads = 8, dim_head = 64, dropout = 0.):\n        super().__init__()\n        # assert dim == dim_head * heads\n        inner_dim = heads * dim_head\n        self.heads = heads\n        self.scale = dim_head ** -0.5\n\n        self.norm = nn.LayerNorm(dim)\n        \n        self.scores = nn.Softmax(dim=-1)\n        self.dropout = nn.Dropout(dropout)\n\n        self.to_qkv = nn.Linear(dim, inner_dim * 3, bias = False)\n\n        self.out = nn.Sequential(\n            nn.Linear(inner_dim, dim),\n            nn.Dropout(dropout)\n        )\n    \n    def forward(self, x):\n        x = self.norm(x)\n\n        qkv = self.to_qkv(x).chunk(3, dim=-1)        \n        b, n, _ = x.shape\n\n        q, k, v = map(lambda t: t.view(b, n, self.heads, -1).transpose(1, 2), qkv)\n        score = self.scores(torch.matmul(q, k.transpose(-1, -2)) * self.scale)\n\n        attn = self.dropout(score)\n\n        out = torch.matmul(attn, v) # B, h, L, dim_heads\n        out = out.transpose(1, 2).contiguous().view(b, n, -1)\n        return self.out(out)\n\nclass Model(nn.Module):\n    def __init__(self, dim, depth, heads, dim_head, ffn_dim, dropout = 0.):\n        super().__init__()\n        self.norm = nn.LayerNorm(dim)\n        self.layers = ModuleList([])\n\n        for _ in range(depth):\n            self.layers.append(\n                ModuleList([\n                    Attn(dim, heads = heads, dim_head = dim_head, dropout = dropout),\n                    FeedForward(dim, ffn_dim, dropout= dropout)\n                ])\n            )\n        \n    def forward(self, x):\n        for att, ffn in self.layers:\n            x = att(x) + x\n            x = ffn(x) + x\n        \n        return self.norm(x)\n        \nclass Patchify(nn.Module):\n    def __init__(self, p1, p2):\n        super().__init__()\n        self.p1, self.p2 = p1, p2\n\n    def forward(self, img):\n        B, C, H, W = img.shape\n        p1, p2 = self.p1, self.p2\n\n        assert H % p1 == 0 and W % p2 == 0, f'image {H}*{W} not divisible by patch {p1}*{p2}'\n\n        h, w = H // p1, W // p2\n\n        x = img.view(B, C, h, p1, w, p2)\n        x = x.permute(0, 2, 4, 3, 5, 1) # B, h, w, p1, p2, c\n\n        return x.reshape(B, h*w, p1*p2*C)\n\nclass ViT(nn.Module):\n    def __init__(self, *, image_size, patch_size, num_classes, dim, depth, heads, \n                 ffn_dim, pool = 'cls', channels = 3, dim_head = 64, dropout = 0., emb_dropout = 0.):\n        super().__init__()\n\n        num_patches = (image_size // patch_size) ** 2\n        patch_dim = channels * patch_size *patch_size\n\n        self.to_patch = nn.Sequential(\n            Patchify(patch_size, patch_size),\n            nn.LayerNorm(patch_dim),\n            nn.Linear(patch_dim, dim),\n            nn.LayerNorm(dim)\n        )\n\n        num_cls_tokens = 1 if pool == 'cls' else 0\n        self.cls_token = nn.Parameter(torch.randn(num_cls_tokens, dim))\n\n        self.pos_embedding = nn.Parameter(torch.randn(num_cls_tokens+num_patches, dim))\n\n        self.dropout = nn.Dropout(emb_dropout)\n\n        self.model = Model(dim, depth, heads, dim_head, ffn_dim, dropout=dropout)\n\n        self.pool = pool\n\n        # Transferability\n        self.to_latent = nn.Identity()\n\n        self.classifier = nn.Linear(dim, num_classes) if num_classes > 0 else None\n\n\n    def forward(self, img):\n        x = self.to_patch(img)      # (B, n, dim)\n        b = x.shape[0]\n\n        cls_tokens = self.cls_token.unsqueeze(0).expand(b, -1, -1)\n        x = torch.cat((cls_tokens, x), dim = 1) \n        x = x + self.pos_embedding[: x.shape[1]]\n        x = self.dropout(x)\n\n        x = self.model(x)                               \n\n        if self.classifier is None:\n            return x                                          \n\n        x = x.mean(dim=1) if self.pool == \"mean\" else x[:, 0]  \n        return self.classifier(self.to_latent(x))\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    cfg = dict(image_size=32, patch_size=4, dim=128, depth=4,\n               heads=4, dim_head=32, ffn_dim=256, pool=\"cls\")\n    B = 2\n    n_tok = (cfg[\"image_size\"] // cfg[\"patch_size\"]) ** 2          # 64 patches\n\n    def nparams(m): return sum(p.numel() for p in m.parameters())\n\n    net = ViT(num_classes=10, **cfg).eval()\n    x = torch.randn(B, 3, cfg[\"image_size\"], cfg[\"image_size\"])\n\n    # 1) contract: an image becomes class logits\n    logits = net(x)\n    print(f\"tokens   {n_tok} patches + 1 cls = {n_tok + 1}\")\n    print(f\"shape    {tuple(x.shape)} --ViT--> {tuple(logits.shape)}    params {nparams(net):,}\")\n    assert logits.shape == (B, 10)\n\n    # 2) duality: num_classes=0 turns ViT into a vision tower -> visual tokens (the VLM hook)\n    tower = ViT(num_classes=0, **cfg).eval()\n    tokens = tower(x)\n    print(f\"encoder  {tuple(x.shape)} --ViT(classes=0)--> {tuple(tokens.shape)}\")\n    assert tokens.shape == (B, n_tok + 1, cfg[\"dim\"])\n\n    # 3) wiring: one backward must reach EVERY weight -- patchify, cls, pos, blocks, head\n    net.zero_grad(); net(x).sum().backward()\n    params = list(net.named_parameters())\n    dead = [n for n, p in params if p.grad is None or p.grad.abs().sum().item() == 0]\n    print(f\"grad     {len(params) - len(dead)}/{len(params)} weights receive gradient\")\n    assert not dead, f\"no gradient reached: {dead}\"\n\n    # 4) signature: kill the position embedding -> the answer must change (patch order is real)\n    with torch.no_grad():\n        base = net(x).clone()\n        net.pos_embedding.zero_()\n        assert not torch.allclose(base, net(x)), \"position embedding does nothing?\"\n    print(\"pos-emb  zeroing positions changes logits  ->  order matters\")\n\n\n", "code_file": "vit.py", "zone": "vision", "qwen": "ViT · patch embed", "replaces": "CNN（卷积归纳偏置）", "who": "所有 VLM 视觉塔"}, {"key": "cv/clip", "name": "clip", "title": "cv/clip — Contrastive Language–Image Pre-training", "oneliner": "CLIP learns to put images and text into the same embedding space.", "mastery": "explained", "readme": "# cv/clip — Contrastive Language–Image Pre-training\n\nCLIP learns to put images and text into the same embedding space.\n\nGiven a batch of matched image–caption pairs, the image encoder maps each image to a vector and the text encoder maps each caption to a vector. After L2 normalization, their dot product is cosine similarity. For a batch of `B` pairs, we get a `B × B` similarity matrix:\n\n- diagonal cells are the real image–caption pairs\n- off-diagonal cells are treated as negatives\n\nThe loss pushes the diagonal up and the off-diagonal down. There are no class labels. The only supervision is which caption came with which image.\n\nThis is what makes CLIP useful: at test time, classes can be written as text prompts. Instead of training a fixed classifier head, we encode prompts like `\"a red circle\"` or `\"a blue square\"` and rank them by similarity to the image. So classification becomes nearest-text matching in the shared space.\n\n    images [B,3,32,32]              texts [B,L]\n       │ image encoder                 │ text encoder\n       ▼                               ▼\n     image features [B,d]          text features [B,d]\n       │                               │\n       └────── L2 normalize ───────────┘\n                      │\n            logits = scale · image @ text.T     [B,B]\n            loss = CE(logits, arange(B)) + CE(logits.T, arange(B))\n\nThe projection layers are just linear maps. The encoders do the nonlinear feature extraction; the projections only move both modalities into the same coordinate system. L2 normalization puts all vectors on the unit sphere, so similarity is about direction, not magnitude. The learnable temperature controls how sharp the similarity scores are.\n\nThis implementation is small on purpose. It uses the local ViT as the image tower and a small Transformer as the text tower.\n\n## Experiment\n\nRun:\n\n    python clip.py\n\nThe toy dataset has 18 classes: 6 colors × 3 shapes. Each class has a simple text caption. The experiment checks four things:\n\n    contract zi,zt unit on R^128 sphere, shape (18, 128)   init diag-acc 6% (chance 6%)\n             init loss  scaled 2.96  |  unscaled 2.89  (ln B = 2.89)\n    learns   loss 2.96 -> 0.01   diagonal-match accuracy 96%   logit_scale 37.1\n    prompt   fresh images vs 18 class captions, no classifier head: top-1 98%\n    batch    B=4 (3 neg) 29%   B=9 (8 neg) 44%   B=18 (17 neg) 98%\n\nWhat each line means:\n\n- `contract`: both towers output unit vectors in the same dimension. At initialization, the diagonal is not special.\n- `learns`: after training, matched image–caption pairs have much higher similarity than mismatched pairs.\n- `prompt`: fresh images can be classified by comparing them with text captions, without a trained classifier head.\n- `batch`: larger batches give more in-batch negatives, which makes the contrastive task stronger.\n\nThis is a mechanism check, not a benchmark. The toy data is simple, so high accuracy only means the CLIP wiring is correct.\n\nOne caveat: the prompt test is not true unseen-class zero-shot. All 18 class captions appear during training. It only shows that classification can be done without a classifier head. A stronger next test would hold out a color–shape pair during training and test whether the model can classify that unseen combination.\n\n", "code": "import torch\nimport torch.nn as nn\nfrom torch.nn import functional as F\nimport math\nimport sys, pathlib\nsys.path.insert(0, str(pathlib.Path(__file__).resolve().parents[1] / \"vit\"))\nfrom vit import ViT, Model\n\nclass CLIP(nn.Module):\n    def __init__(self, image_encoder, text_encoder, d_v, d_t, d=512):\n        super().__init__()\n        self.image_encoder = image_encoder\n        self.text_encoder = text_encoder\n\n        self.image_proj = nn.Linear(d_v, d, bias=False)\n        self.text_proj = nn.Linear(d_t, d, bias=False)\n\n        self.logit_scale = nn.Parameter(torch.tensor(math.log(1/0.07)))\n\n    def forward(self, images, texts):\n        e_img = F.normalize(self.image_proj(self.image_encoder(images)), dim= -1) #[B, d]\n        e_text = F.normalize(self.text_proj(self.text_encoder(texts)), dim=-1)    #[B, d]\n\n        logits = self.logit_scale.exp() * e_img @ e_text.t()\n\n        labels = torch.arange(len(images), device=images.device)\n\n\n        loss_image = F.cross_entropy(logits, labels)\n        loss_text = F.cross_entropy(logits.t(), labels)\n\n        return (loss_image + loss_text)/2\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    DIM = 128\n    COLORS = {\"red\": (.9, .2, .2), \"green\": (.2, .8, .3), \"blue\": (.3, .4, .95),\n              \"yellow\": (.9, .85, .2), \"purple\": (.6, .25, .8), \"orange\": (.95, .55, .15)}\n    SHAPES = [\"square\", \"circle\", \"triangle\"]\n    CLASSES = [(c, s) for c in COLORS for s in SHAPES]                  # 18 distinct (color, shape)\n    VOCAB = {w: i for i, w in enumerate(sorted({\"a\", *COLORS, *SHAPES}))}   # word-level lookup, no BPE\n    CAP_LEN = 3\n    yy, xx = torch.meshgrid(torch.arange(32), torch.arange(32), indexing=\"ij\")\n\n    def caption(color, shape):\n        return [VOCAB[w] for w in (\"a\", color, shape)]\n\n    def render(color, shape, r=8):                # a flat colored shape, position-jittered + noisy\n        cy, cx = (16 + torch.randint(-2, 3, (2,))).tolist()\n        dy, dx = yy - cy, xx - cx\n        if   shape == \"square\":   mask = (dx.abs() <= r) & (dy.abs() <= r)\n        elif shape == \"circle\":   mask = dx**2 + dy**2 <= r*r\n        else:                     mask = (dy >= -r) & (dy <= r) & (dx.abs().float() <= (dy + r).clamp(min=0)*.5)\n        col = torch.tensor(COLORS[color]).view(3, 1, 1)\n        img = torch.where(mask.unsqueeze(0), col, torch.full((3, 32, 32), .08))\n        return (img + .03 * torch.randn(3, 32, 32)).clamp(0, 1)\n\n    def batch(n):                                 # n DISTINCT classes -> no duplicate captions, clean diagonal\n        idx = torch.randperm(len(CLASSES))[:n]\n        imgs = torch.stack([render(*CLASSES[i]) for i in idx])\n        caps = torch.tensor([caption(*CLASSES[i]) for i in idx])\n        return imgs, caps\n\n    class ImageTower(nn.Module):                  # the hand-written ViT, head dropped (num_classes=0)\n        def __init__(self):\n            super().__init__()\n            self.vit = ViT(num_classes=0, image_size=32, patch_size=4, dim=DIM,\n                           depth=4, heads=4, dim_head=32, ffn_dim=4*DIM, pool=\"cls\")\n        def forward(self, img):\n            return self.vit(img)[:, 0]            # CLS token = pooled image vector\n\n    class TextTower(nn.Module):                   # nn.Embedding + the SAME Transformer block + mean-pool\n        def __init__(self):\n            super().__init__()\n            self.emb = nn.Embedding(len(VOCAB), DIM)\n            self.pos = nn.Parameter(torch.randn(CAP_LEN, DIM))\n            self.model = Model(DIM, depth=2, heads=4, dim_head=32, ffn_dim=4*DIM)\n        def forward(self, tok):\n            return self.model(self.emb(tok) + self.pos[:tok.shape[1]]).mean(dim=1)\n\n    def make_clip():\n        return CLIP(ImageTower(), TextTower(), d_v=DIM, d_t=DIM, d=DIM)\n\n    @torch.no_grad()\n    def embed(m, imgs, caps):\n        zi = F.normalize(m.image_proj(m.image_encoder(imgs)), dim=-1)\n        zt = F.normalize(m.text_proj(m.text_encoder(caps)), dim=-1)\n        return zi, zt\n\n    @torch.no_grad()\n    def diag_acc(m, n=len(CLASSES), reps=4):       # fraction whose row-argmax is the diagonal\n        hit = 0.\n        for _ in range(reps):\n            zi, zt = embed(m, *batch(n))\n            hit += ((zi @ zt.t()).argmax(1) == torch.arange(n)).float().mean().item()\n        return hit / reps\n\n    @torch.no_grad()\n    def zeroshot_acc(m, trials=12):                # no classifier head: classify fresh images by nearest caption\n        caps = torch.tensor([caption(*c) for c in CLASSES])\n        _, zt = embed(m, torch.zeros(len(CLASSES), 3, 32, 32), caps)\n        hit = tot = 0\n        for _ in range(trials):\n            zi, _ = embed(m, torch.stack([render(*c) for c in CLASSES]), caps)\n            hit += ((zi @ zt.t()).argmax(1) == torch.arange(len(CLASSES))).sum().item(); tot += len(CLASSES)\n        return hit / tot\n\n    def train(m, B, steps, lr=3e-3):\n        opt = torch.optim.Adam(m.parameters(), lr=lr)\n        first = last = None\n        for t in range(steps):\n            loss = m(*batch(B))\n            opt.zero_grad(); loss.backward(); opt.step()\n            with torch.no_grad():\n                m.logit_scale.clamp_(max=math.log(100))    # the one CLIP-specific gotcha\n            if t == 0: first = loss.item()\n            last = loss.item()\n        return first, last\n\n    B = len(CLASSES)\n    print(f\"world    {len(COLORS)} colors x {len(SHAPES)} shapes = {len(CLASSES)} classes | \"\n          f\"vocab {len(VOCAB)} words | image 32x32, 64 patches\")\n\n    # 1) contract: two towers -> unit vectors on a shared sphere; at random init the diagonal is not special\n    m = make_clip()\n    imgs, caps = batch(B)\n    zi, zt = embed(m, imgs, caps)\n    assert zi.shape == zt.shape == (B, DIM)\n    assert torch.allclose(zi.norm(dim=-1), torch.ones(B), atol=1e-5), \"image vectors not unit length\"\n    assert torch.allclose(zt.norm(dim=-1), torch.ones(B), atol=1e-5), \"text vectors not unit length\"\n    loss0 = m(imgs, caps).item()\n    unscaled = F.cross_entropy(zi @ zt.t(), torch.arange(B)).item()     # same logits without the 14.3 scale\n    print(f\"contract zi,zt unit on R^{DIM} sphere, shape {tuple(zi.shape)}   \"\n          f\"init diag-acc {diag_acc(m, B):.0%} (chance {1/B:.0%})\")\n    print(f\"         init loss  scaled {loss0:.2f}   |   unscaled {unscaled:.2f}  (ln B = {math.log(B):.2f})\"\n          f\"   <- no signal at init\")\n    assert diag_acc(m, B) < 0.30, \"diagonal already aligned before training?\"\n\n    # 2) it learns: symmetric InfoNCE pulls matched pairs together, pushes the rest apart\n    torch.manual_seed(0); m = make_clip()\n    first, last = train(m, B=B, steps=1200)\n    acc = diag_acc(m, B)\n    print(f\"learns   loss {first:.2f} -> {last:.2f}   diagonal-match accuracy {acc:.0%}   logit_scale \"\n          f\"{m.logit_scale.exp().item():.1f}\")\n    assert last < first - 1.0 and acc > 0.90, \"contrastive training did not align the towers\"\n\n    # 3) zero-shot: classify a fresh image by ranking text prompts -- the classifier was never trained\n    zs = zeroshot_acc(m)\n    print(f\"zeroshot fresh images vs {len(CLASSES)} class captions, NO classifier head:  top-1 {zs:.0%}\")\n    assert zs > 0.85, \"alignment did not transfer to zero-shot\"\n\n    # 4) batch size: more in-batch negatives = stronger contrast, judged by a batch-free metric (zero-shot)\n    print(\"batch    same steps & lr, vary B (=> #negatives):\")\n    for b in (4, 9, 18):\n        torch.manual_seed(0); mb = make_clip()\n        train(mb, B=b, steps=600)\n        print(f\"           B={b:>2}  ({b-1:>2} negatives/anchor)   zero-shot {zeroshot_acc(mb):.0%}\")\n\n    print(\"\\nthrough-line: the only label is arange(B) -- the diagonal. Bigger batches hand the loss \"\n          \"more negatives per anchor, so contrast is stronger and alignment is faster; once the two \"\n          \"towers share a sphere, zero-shot classification falls out for free, no classifier trained.\")\n", "code_file": "clip.py", "zone": "vision", "qwen": "CLIP 式对齐训练", "replaces": "有监督标签预训练", "who": "CLIP · SigLIP · 多数 VLM"}, {"key": "cv/siglip", "name": "siglip", "title": "cv/siglip — Sigmoid Loss for Language–Image Pre-training", "oneliner": "SigLIP is CLIP with exactly one thing changed: the loss. CLIP scores a batch of `B` image–text pairs into a `B×B` similarity matrix and normalizes each row and ", "mastery": "explained", "readme": "# cv/siglip — Sigmoid Loss for Language–Image Pre-training\n\nSigLIP is CLIP with exactly one thing changed: the loss. CLIP scores a batch of `B` image–text\npairs into a `B×B` similarity matrix and normalizes each row and column with a softmax — the diagonal\n(the matched pair) must *win* its row. That softmax couples the whole row through its denominator: to\nnormalize you need every text in the batch, which is why CLIP leans on very large batches (up to 32k)\nand, in distributed training, an all-gather of every feature to form the denominator. SigLIP replaces\nthe softmax with a **sigmoid applied to every cell independently**: each `(image i, text j)` pair is\nits own binary \"matched? yes/no.\" There is no denominator and no competition, so the batch drops from\n*part of the loss* back to *just the source of samples* — the matrix can be scored in chunks and the\nloss needs no global normalization. The surprising part is that nothing is lost: the working\ningredient of contrastive learning was never the in-batch softmax competition, it was the\nmatched-vs-mismatched discrimination itself. (Same family of result as RMSNorm dropping centering — a\npart assumed mandatory turns out to be detachable.)\n\nThe catch is class imbalance. A batch has `B` positive pairs and `B²−B` negatives; at any real batch\nsize the negatives swamp the positives, and at init the summed gradient is dominated by \"push\neverything apart,\" drowning the few \"pull matched pairs together\" signals. The fix is a learnable\n**bias `b`, initialized to −10** (with the temperature `t = exp(t')` initialized to 10): the model\nstarts predicting \"not a match\" for *everything*, so the flood of negatives is already satisfied and\nonly the `B` positives carry gradient from step one. This is the same trick as the foreground-bias\ninit in focal loss — set the bias to the prior log-odds of the rare class. The temperature is the same\nlearnable confidence dial as CLIP's `logit_scale`: cosine similarity is bounded in `[−1, 1]`, so\nwithout a scale the logits can never be sharp; `t` scales them up, and because its gradient is `∝\nsimilarity` it climbs during training only as fast as the embeddings actually separate.\n\n> **References** — Zhai et al., *Sigmoid Loss for Language Image Pre-Training*, ICCV 2023\n> ([arXiv:2303.15343](https://arxiv.org/abs/2303.15343)) · *SigLIP 2*, 2025\n> ([arXiv:2502.14786](https://arxiv.org/abs/2502.14786)) · official (JAX)\n> [google-research/big_vision](https://github.com/google-research/big_vision) · cleanest PyTorch\n> reference: `SigLipLoss` in `src/open_clip/loss.py` of\n> [mlfoundations/open_clip](https://github.com/mlfoundations/open_clip). Prerequisite:\n> [`../clip`](../clip) (the two towers + InfoNCE this builds on).\n\n```\nimages [B,3,32,32]              texts [B,L]\n   │ image encoder                 │ text encoder\n   ▼                               ▼\n image features [B,d]          text features [B,d]\n   │                               │\n   └────── L2 normalize ───────────┘\n                  │\n        logits = t · image @ text.T + b        [B,B]      (CLIP: no + b)\n        labels = 2·I − 1        (+1 on the diagonal, −1 off-diagonal)\n        loss   = −Σ logσ(labels ⊙ logits) / B             (CLIP: CE(·,arange) twice)\n```\n\nOnly the loss changes, so the two towers, the projections, the L2 normalization, the toy world and\nthe training loop are reused verbatim from [`../clip`](../clip): `siglip.py` imports the same\nhand-written ViT image tower and small Transformer text tower. The diff against `clip.py` is exactly\nthree edits — a `+ bias` term in the logits, `labels = 2·eye − 1` instead of `arange`, and a single\n`logsigmoid` sum in place of the two cross-entropies. The loss is normalized by `B`, **not `B²`**:\nthat keeps the per-anchor scale comparable to CLIP's row-wise cross-entropy and preserves the positive\nsignal (dividing by `B²` would shrink each positive's weight to `1/B`). The positive/negative\nimbalance is handled by the *bias*, not by the normalization constant — two separate knobs: `/B`\ncontrols loss scale across batch sizes, `b` controls the imbalance. The temperature keeps CLIP's one\nrunaway clamp at 100.\n\nA common myth worth correcting: *\"every modern VLM vision tower is SigLIP.\"* The lineage is mixed —\nPaliGemma / Idefics2 / LLaVA-OneVision use SigLIP(-SO400M), the InternVL line uses its own InternViT,\nQwen2-VL trains its own dynamic-resolution ViT with 2-D RoPE. The 2024–25 frontier differences live\nin resolution handling, token merging, the projector, and positional encoding — not in whether the\ntower's contrastive loss is softmax or sigmoid. That is also why this component is a *nice-to-have* on\nthe CV sidetrack rather than core.\n\n## Experiment (`python siglip.py`)\n\nThe same toy world as [`../clip`](../clip) — 18 classes (6 colors × 3 shapes), one short caption each.\nFour blocks, each pinning one property of the sigmoid objective:\n\n```\nbias     init mean P(match) 0.0001  = sigmoid(b), ~0 -> 'nothing matches' at init\n         init loss  b=-10  9.30 (~|b|, only 18 positives speak)   |   b=0 19.47 (>= ln2*B = 12.5 floor, all 306 negatives flood in)\nlearns   loss 9.30 -> 0.15   diagonal-match 100%   temp 14.6   bias -10.4\nzeroshot fresh images vs 18 captions, NO classifier head:  top-1 98%\ntemp     step ->  temperature  (flat at init, climbs as the towers separate)\n              0        10.0      diag 6%\n              5        10.0      diag 6%\n             50         9.9      diag 11%\n            300        10.1      diag 58%\n           1199        14.6      diag 99%\ndrown    frozen bias, B=6, equal steps & lr -- the negative flood made visible:\n           b=  -10 (frozen)   diagonal-match 63%\n           b=    0 (frozen)   diagonal-match 17%\n```\n\nWhat each block means:\n\n- **bias** — the load-bearing init. At step 0 the model predicts `P(match) ≈ σ(b) ≈ 0` for every\n  pair: \"nothing matches.\" With `b=−10` the init loss `≈ |b|` because only the `B` positives\n  contribute; with `b=0` it jumps to ~19 — above the `ln2·B` coin-flip floor — as all `B²−B` negatives\n  flood in. That gap is exactly what the bias exists to prevent.\n- **learns / zeroshot** — the per-pair sigmoid aligns the towers (loss `9.3 → 0.15`, diagonal 100%,\n  zero-shot 98%) with *no* softmax denominator. Note the bias drifts to `−10.4`: it is learnable but\n  stays negative, parking the decision boundary `sim = −b/t` in the gap between matched and mismatched\n  similarities.\n- **temp** — temperature sits flat (~10) while the embeddings are still random (diag 6–11%), then\n  climbs to 14.6 once they separate (diag → 99%). Its gradient is `∝ similarity`, so it earns\n  confidence only as fast as the representation does — it cannot be cranked up for free, because a high\n  `t` amplifies mistakes just as much as correct margins.\n- **drown** — the imbalance, isolated. With the bias *frozen* so it cannot self-correct, `b=−10`\n  reaches 63% while `b=0` stalls at 17% (= chance at `B=6`): the negative flood, made visible. A\n  *learnable* bias mostly closes this gap on a toy (it learns to go negative on its own), which is why\n  the effect shows up as a head-start that widens at the 32k batches SigLIP actually uses.\n\nThis is a **mechanism** check, not a benchmark — the toy is clean, so the high numbers only confirm the\nwiring is correct. As in [`../clip`](../clip), the \"zero-shot\" test is not true unseen-class: all 18\ncaptions appear during training, so it shows classification *without a trained head*, not\ngeneralization to a held-out color–shape pair.\n\n", "code": "import torch\nimport torch.nn as nn\nfrom torch.nn import functional as F\nimport math\nimport sys, pathlib\nsys.path.insert(0, str(pathlib.Path(__file__).resolve().parents[1] / \"vit\"))\nfrom vit import ViT, Model\n\nclass SigLIP(nn.Module):\n    def __init__(self, image_encoder, text_encoder, d_v, d_t, d=512, bias_init=-10., learn_bias=True):\n        super().__init__()\n        self.image_encoder = image_encoder\n        self.text_encoder = text_encoder\n\n        self.image_proj = nn.Linear(d_v, d, bias=False)\n        self.text_proj = nn.Linear(d_t, d, bias=False)\n\n        self.logit_scale = nn.Parameter(torch.tensor(math.log(10.)))                \n        self.bias = nn.Parameter(torch.tensor(float(bias_init)), requires_grad=learn_bias)  \n\n    def forward(self, images, texts):\n        e_img = F.normalize(self.image_proj(self.image_encoder(images)), dim=-1)  #[B, d]\n        e_text = F.normalize(self.text_proj(self.text_encoder(texts)), dim=-1)    #[B, d]\n\n        logits = self.logit_scale.exp() * e_img @ e_text.t() + self.bias          #[B, B]  (+ bias)\n\n        n = len(images)\n        labels = 2 * torch.eye(n, device=images.device) - 1                       # +1 on the diagonal, -1 everywhere else\n\n        return -F.logsigmoid(labels * logits).sum() / n                          # every pair its own sigmoid, averaged over the B anchors\n\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    DIM = 128\n    COLORS = {\"red\": (.9, .2, .2), \"green\": (.2, .8, .3), \"blue\": (.3, .4, .95),\n              \"yellow\": (.9, .85, .2), \"purple\": (.6, .25, .8), \"orange\": (.95, .55, .15)}\n    SHAPES = [\"square\", \"circle\", \"triangle\"]\n    CLASSES = [(c, s) for c in COLORS for s in SHAPES]                  # 18 distinct (color, shape)\n    VOCAB = {w: i for i, w in enumerate(sorted({\"a\", *COLORS, *SHAPES}))}   # word-level lookup, no BPE\n    CAP_LEN = 3\n    yy, xx = torch.meshgrid(torch.arange(32), torch.arange(32), indexing=\"ij\")\n\n    def caption(color, shape):\n        return [VOCAB[w] for w in (\"a\", color, shape)]\n\n    def render(color, shape, r=8):                # a flat colored shape, position-jittered + noisy\n        cy, cx = (16 + torch.randint(-2, 3, (2,))).tolist()\n        dy, dx = yy - cy, xx - cx\n        if   shape == \"square\":   mask = (dx.abs() <= r) & (dy.abs() <= r)\n        elif shape == \"circle\":   mask = dx**2 + dy**2 <= r*r\n        else:                     mask = (dy >= -r) & (dy <= r) & (dx.abs().float() <= (dy + r).clamp(min=0)*.5)\n        col = torch.tensor(COLORS[color]).view(3, 1, 1)\n        img = torch.where(mask.unsqueeze(0), col, torch.full((3, 32, 32), .08))\n        return (img + .03 * torch.randn(3, 32, 32)).clamp(0, 1)\n\n    def batch(n):                                 # n DISTINCT classes -> no duplicate captions, clean diagonal\n        idx = torch.randperm(len(CLASSES))[:n]\n        imgs = torch.stack([render(*CLASSES[i]) for i in idx])\n        caps = torch.tensor([caption(*CLASSES[i]) for i in idx])\n        return imgs, caps\n\n    class ImageTower(nn.Module):                  # the hand-written ViT, head dropped (num_classes=0)\n        def __init__(self):\n            super().__init__()\n            self.vit = ViT(num_classes=0, image_size=32, patch_size=4, dim=DIM,\n                           depth=4, heads=4, dim_head=32, ffn_dim=4*DIM, pool=\"cls\")\n        def forward(self, img):\n            return self.vit(img)[:, 0]            # CLS token = pooled image vector\n\n    class TextTower(nn.Module):                   # nn.Embedding + the SAME Transformer block + mean-pool\n        def __init__(self):\n            super().__init__()\n            self.emb = nn.Embedding(len(VOCAB), DIM)\n            self.pos = nn.Parameter(torch.randn(CAP_LEN, DIM))\n            self.model = Model(DIM, depth=2, heads=4, dim_head=32, ffn_dim=4*DIM)\n        def forward(self, tok):\n            return self.model(self.emb(tok) + self.pos[:tok.shape[1]]).mean(dim=1)\n\n    def make_siglip(bias_init=-10., learn_bias=True):\n        return SigLIP(ImageTower(), TextTower(), d_v=DIM, d_t=DIM, d=DIM,\n                      bias_init=bias_init, learn_bias=learn_bias)\n\n    @torch.no_grad()\n    def embed(m, imgs, caps):\n        zi = F.normalize(m.image_proj(m.image_encoder(imgs)), dim=-1)\n        zt = F.normalize(m.text_proj(m.text_encoder(caps)), dim=-1)\n        return zi, zt\n\n    @torch.no_grad()\n    def diag_acc(m, n=len(CLASSES), reps=4):       # fraction whose row-argmax is the diagonal\n        hit = 0.\n        for _ in range(reps):\n            zi, zt = embed(m, *batch(n))\n            hit += ((zi @ zt.t()).argmax(1) == torch.arange(n)).float().mean().item()\n        return hit / reps\n\n    @torch.no_grad()\n    def zeroshot_acc(m, trials=12):                # no classifier head: classify fresh images by nearest caption\n        caps = torch.tensor([caption(*c) for c in CLASSES])\n        _, zt = embed(m, torch.zeros(len(CLASSES), 3, 32, 32), caps)\n        hit = tot = 0\n        for _ in range(trials):\n            zi, _ = embed(m, torch.stack([render(*c) for c in CLASSES]), caps)\n            hit += ((zi @ zt.t()).argmax(1) == torch.arange(len(CLASSES))).sum().item(); tot += len(CLASSES)\n        return hit / tot\n\n    def train(m, B, steps, lr=3e-3, log=None):     # log: set of steps to snapshot (step, loss, temp, diag-acc)\n        opt = torch.optim.Adam(m.parameters(), lr=lr)\n        first = last = None; hist = []\n        for t in range(steps):\n            loss = m(*batch(B))\n            opt.zero_grad(); loss.backward(); opt.step()\n            with torch.no_grad():\n                m.logit_scale.clamp_(max=math.log(100))    # CLIP's one runaway guard, kept verbatim\n            if t == 0: first = loss.item()\n            last = loss.item()\n            if log is not None and t in log:\n                hist.append((t, loss.item(), m.logit_scale.exp().item(), diag_acc(m, B)))\n        return first, last, hist\n\n    B = len(CLASSES)\n    print(f\"world    {len(COLORS)} colors x {len(SHAPES)} shapes = {len(CLASSES)} classes | \"\n          f\"vocab {len(VOCAB)} words | image 32x32, 64 patches\")\n\n    # 1) the bias is load-bearing: b=-10 starts the model at \"nothing matches\", so only the B\n    #    positives carry loss at init; with b=0 the B^2-B negatives flood in (loss ~ ln2 * B).\n    torch.manual_seed(0); m = make_siglip(bias_init=-10.)\n    imgs, caps = batch(B); zi, zt = embed(m, imgs, caps)\n    assert zi.shape == zt.shape == (B, DIM)\n    assert torch.allclose(zi.norm(dim=-1), torch.ones(B), atol=1e-5), \"image vectors not unit length\"\n    with torch.no_grad():\n        p_init = (m.logit_scale.exp() * zi @ zt.t() + m.bias).sigmoid().mean().item()\n    loss_b10 = m(imgs, caps).item()\n    torch.manual_seed(0); loss_b0 = make_siglip(bias_init=0.)(imgs, caps).item()   # same towers, only b differs\n    print(f\"bias     init mean P(match) {p_init:.4f}  = sigmoid(b), ~0 -> 'nothing matches' at init\")\n    print(f\"         init loss  b=-10 {loss_b10:5.2f} (~|b|, only {B} positives speak)   |   \"\n          f\"b=0 {loss_b0:5.2f} (>= ln2*B = {math.log(2)*B:.1f} floor, all {B*B-B} negatives flood in)\")\n    assert abs(loss_b10 - 10.) < 1.5 and loss_b0 > loss_b10, \"b=-10 should isolate the positives at init\"\n\n    # 2) it learns: the per-pair sigmoid pulls matched pairs up and pushes the rest down -- no\n    #    softmax, no batch-coupled denominator -- yet diagonal alignment + zero-shot fall out as in CLIP.\n    torch.manual_seed(0); m = make_siglip(bias_init=-10.)\n    snaps = {0, 5, 50, 300, 1199}\n    first, last, hist = train(m, B=B, steps=1200, log=snaps)\n    acc = diag_acc(m, B)\n    print(f\"learns   loss {first:.2f} -> {last:.2f}   diagonal-match {acc:.0%}   \"\n          f\"temp {m.logit_scale.exp().item():.1f}   bias {m.bias.item():.1f}\")\n    assert last < first - 1.0 and acc > 0.90, \"sigmoid contrastive did not align the towers\"\n    zs = zeroshot_acc(m)\n    print(f\"zeroshot fresh images vs {len(CLASSES)} captions, NO classifier head:  top-1 {zs:.0%}\")\n    assert zs > 0.85, \"alignment did not transfer to zero-shot\"\n\n    # 3) temperature is a learned confidence dial.  Its gradient ~ sim, so it sits still while the\n    #    embeddings are random, then climbs once they separate (raising t sharpens a now-correct margin).\n    print(\"temp     step ->  temperature  (flat at init, climbs as the towers separate)\")\n    for (t, l, temp, a) in sorted(hist):\n        print(f\"           {t:>4}      {temp:6.1f}      diag {a:.0%}\")\n    assert hist[-1][2] > hist[0][2] + 2.0, \"temperature did not climb during training\"\n    assert abs(hist[0][2] - 10.) < 3.0, \"temperature should start near its init (10)\"\n\n    # 4) negative drowning, isolated: FREEZE the bias so it can't self-heal.  b=-10 starts the\n    #    negatives already satisfied (clean signal); b=0 lets the B^2-B negatives dominate the early\n    #    gradient, so alignment starts slower.  (a LEARNABLE bias mostly closes the gap -- it learns\n    #    to go negative on its own -- which is why this is a head-start, widening at SigLIP's real 32k batches.)\n    print(\"drown    frozen bias, B=6, equal steps & lr -- the negative flood made visible:\")\n    for binit in (-10., 0.):\n        torch.manual_seed(0); mb = make_siglip(bias_init=binit, learn_bias=False)\n        train(mb, B=6, steps=300)\n        print(f\"           b={binit:>5.0f} (frozen)   diagonal-match {diag_acc(mb, 6):.0%}\")\n\n    print(\"\\nthrough-line: only the loss changed -- arange + softmax-CE became a per-pair sigmoid on \"\n          \"2*eye-1. bias=-10 hands the model the right prior (most pairs DON'T match) so the B \"\n          \"positives aren't drowned; temperature is a confidence dial that climbs only as fast as the \"\n          \"embeddings earn it. same towers, same toy world as clip.py -- the seam is the objective alone.\")\n", "code_file": "siglip.py", "zone": "vision", "qwen": "sigmoid 对齐目标", "replaces": "CLIP 的 softmax 对比 loss", "who": "SigLIP · 2024+ VLM"}, {"key": "cv/mae", "name": "mae", "title": "cv/mae — Masked Autoencoder", "oneliner": "图切 patch → **随机扔掉 75%** → 一个**深** encoder *只看*剩下的 25% → 一个**浅** decoder", "mastery": "spec", "readme": "# cv/mae — Masked Autoencoder\n\n> **📌 一手出处 / official reference**\n> - 论文 *Masked Autoencoders Are Scalable Vision Learners* — He et al., 2021 · [arXiv:2111.06377](https://arxiv.org/abs/2111.06377)\n> - 官方实现 [facebookresearch/mae](https://github.com/facebookresearch/mae)\n\n> 学习笔记 + 复现 spec。目标：复现完 [`mae.py`](mae.py) 后，能对着代码盲讲\n> **非对称 encoder–decoder + masking 的数据流**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n图切 patch → **随机扔掉 75%** → 一个**深** encoder *只看*剩下的 25% → 一个**浅** decoder\n把扔掉的部分**画回来** → **只在被扔的 patch 上**算重建 MSE。预训练完，encoder 就是通用视觉特征\n提取器（下游把 decoder 扔掉）。本质是 BERT 完形填空搬到图像，但有一个图像独有的转折。\n\n## 🎯 先猜：那个又深又贵的 encoder，要不要处理被遮掉的 75% patch？（想 30 秒）\n\n**答案：完全不碰——encoder 只吃 25% 可见 patch，mask token 要到浅 decoder 才出现。**\n这就是「非对称 (asymmetric) encoder–decoder」，也是标题里 \"scalable\" 的来源。\n\n```\n        25% 可见 patch ──►  ENCODER (深,宽) ──► latent\n                                                  │\n   全部位置 = latent + 共享 mask token ──► DECODER (浅,窄) ──► 重建像素\n```\n\n- **encoder 从不看 mask token**：它的输入序列长度只有 `len_keep`（25%），不是全长。\n- mask token 只在 **decoder** 里才插进来补满位置。和 BERT 不同（BERT 的 `[MASK]` 第一层就进 encoder）。\n\n## 三个关键设计 & 为什么\n\n1. **为什么遮 75% 还能重建？** 自然图像空间冗余极高，缺的能从周围推出来。语言信息密度高（BERT 只遮 15%），图像稀疏，遮 75% 才逼模型学**语义级**理解而非抄邻块像素。\n2. ⭐ **为什么 encoder 不碰 mask token 省这么多算力？** attention 是 `O(L²)`。全看 64 个：`64²=4096`；只看 16 个：`16²=256`，**省 16×**。贵的深 encoder 只花在真信息上，补全交给便宜的浅 decoder。这就是标题里 \"scalable\" 的来源。\n3. **为什么 shuffle + gather 而非布尔 mask？** 每样本保留位置不同→ragged 张量没法 batch。技巧：`noise→argsort=ids_shuffle`，`argsort(ids_shuffle)=ids_restore`（逆排列），gather 前 `len_keep` 个得规则形状；decoder 端用 `ids_restore` 一次 gather 还原原始顺序。全程向量化、无循环。\n4. **norm_pix_loss**：target 用每个 patch 自己的均值/方差归一化，去掉亮度/对比度绝对值，重建更锐利。\n\n## 数据流（`mae.py` 的 shape walk，toy：32×32, patch4 → 64 patch, 遮 75% 留 16）\n\n| 步骤 | shape | 说明 |\n|---|---|---|\n| patchify | `[B,64,48]` | 64 patch，每个 48 维 |\n| embed + 位置（**masking 前加**） | `[B,64,D]` | 可见 token 带着「我是第几块」进 encoder |\n| random masking | `[B,16,D]` | shuffle+gather 留 16，序列变短 |\n| encoder（只吃可见） | `[B,16,D]` | ⚠️ 16 不是 64 |\n| 补 mask token + 反 shuffle | `[B,64,d_dec]` | 空位填同一个可学习向量，`ids_restore` 还原顺序 |\n| + decoder 位置 → decoder → 预测像素 | `[B,64,48]` | |\n| loss | 标量 | **只在被遮的 patch 上**算 MSE |\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **shuffle/gather masking 单独写、单独测**——这是全组件最容易错的一步，先隔离它：\n   `random_masking(x, ratio)` 返回 `(x_kept, mask, ids_restore)`。断言\n   `gather(scatter回去, ids_restore)` 能还原原始顺序；mask 里 1 的个数 == 被遮数。\n2. **encoder 只吃可见**：断言 encoder 输入序列长度 == `len_keep`（16），不是 64——这条断言\n   直接证明「非对称」落地了。\n3. **补 mask token + ids_restore 还原 + decoder**：断言 decoder 输出回到 `[B,64,48]`。\n4. **masked-only loss + 训练**：跑 ⭐。先预测起步 loss（归一化像素的 MSE，量级约多少？）。\n   再加一条对照：在**可见 patch** 上也算 loss，会发现它几乎为 0（模型在抄自己的输入）——\n   反证「loss 只在 masked patch 上算」的必要性。\n\n## ⭐ 必做的 sanity\n\n`train_sanity.py`：CIFAR 训 ~400 步，断言「后 20 步均值 loss < 前 20 步 × 0.9」，存\n`原图 | 75% 遮挡 | 重建` 三联图。toy 规模重建偏糊但**结构对**即证明机制 work。\n\n## ✅ 盲讲检查点\n\n1. encoder 输入序列长度是多少？mask token 在哪一步才出现？\n2. 位置编码为什么在 masking **之前**加？\n3. `ids_restore` 是什么、用来干嘛？怎么从 `ids_shuffle` 得到它？\n4. loss 为什么只在 masked patch 上算？在可见 patch 上算会怎样？\n5. 省算力的根本原因？为什么遮 75% 而 BERT 只遮 15%？\n\n> 下一站 [`../videomae`](../videomae)：同一骨架，只改 3 处就变视频版。\n", "code": "", "code_file": null, "zone": "vision", "qwen": "掩码自监督预训练", "replaces": "有标签预训练", "who": "MAE 系视觉自监督"}, {"key": "cv/videomae", "name": "videomae", "title": "cv/videomae — VideoMAE", "oneliner": "把 [image MAE](../mae) 搬到视频：patch 变成**时空小块 (tubelet)**，masking 变成**沿时间整条", "mastery": "spec", "readme": "# cv/videomae — VideoMAE\n\n> **📌 一手出处 / official reference**\n> - 论文 *VideoMAE: Masked Autoencoders are Data-Efficient Learners for Self-Supervised Video Pre-Training* — Tong et al., NeurIPS 2022 Spotlight · [arXiv:2203.12602](https://arxiv.org/abs/2203.12602)\n> - 官方实现 [MCG-NJU/VideoMAE](https://github.com/MCG-NJU/VideoMAE)\n\n> 学习笔记 + 复现 spec。目标：复现完 [`videomae.py`](videomae.py) 后，能讲清\n> **VideoMAE 相对 image MAE 改了哪几处、为什么改**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n把 [image MAE](../mae) 搬到视频：patch 变成**时空小块 (tubelet)**，masking 变成**沿时间整条\n遮的 tube masking**，掩码率从 75% 拉到 **90%**。骨架（非对称 enc/dec、共享 mask token、\nshuffle/gather 还原、masked 归一化像素 loss）**完全没变**。\n\n## ⭐ MAE → VideoMAE 的全部跨越就这张 diff 表\n\n| 维度 | image MAE | VideoMAE | 为什么 |\n|---|---|---|---|\n| token | 2D patch `p×p` | **tubelet `tt×th×tw`**（Conv3d） | 一个 token 要覆盖一小段时间才能编码「运动」 |\n| 输入 | `[B,3,32,32]` | `[B,3,8,32,32]`（多 T 维） | |\n| masking | 每 token 独立随机遮 | **tube masking**：沿时间遮**同一批空间位置** | 防止抄相邻帧 |\n| 掩码率 | 75% | **90%** | 视频时间冗余远大于图像空间冗余 |\n| 注意力 | 全局 | joint / divided（时空分解省算力） | token 数 `T×H×W` 爆炸 |\n| 其余 | — | **一模一样** | |\n\n## 🎯 先猜：视频遮 patch，按「每帧独立随机遮」会出什么问题？（想 30 秒）\n\n**答案：模型会抄相邻帧的同位置像素——任务退化。解法是 tube masking：沿时间遮同一批空间位置。**\n\n```\n   每帧独立随机遮 (✗)                 tube masking (✓)\nt=0  ▓ · ▓ ·                      t=0  ▓ ▓ · ·\nt=1  · ▓ · ▓  ← 换帧就露同位置      t=1  ▓ ▓ · ·  ← 同位置全程都遮\nt=2  ▓ · · ▓     模型抄隔壁帧即可    t=2  ▓ ▓ · ·\n```\n\n**为什么必须沿时间遮同一批空间位置？** 合成数据里方块每帧只平移几像素，位置 `(t,h,w)` 被遮但\n`(t±1,h,w)` 大概率还在原地可见。若**每帧独立**遮，模型只要学会「从相邻帧复制同位置像素」就能把\nloss 压低——任务退化，学不到时序理解。tube masking 把一个空间位置从**所有帧**一起拿掉，逼模型\n真正建模运动/语义。配合 90% 高掩码率，捷径被彻底堵死。\n\n## 你要复现的目标（TODO）\n\n文件：`videomae.py`、`data_synthetic.py`（合成移动方块）、`train_sanity.py`。\n**直接拷 [`../mae`](../mae) 的骨架，只在上面四处打 `=== DIFF vs MAE ===` 标注的地方改**。\n\n```python\n# tubelet embed: nn.Conv3d(3, D, kernel=(tt,th,tw), stride=(tt,th,tw))\n# tube masking:  先决定空间位置的遮挡，再沿 T 维广播到所有时间\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n直接拷 [`../mae`](../mae) 跑通的骨架，逐处替换：\n\n1. **tubelet embed**：Conv2d → Conv3d，输入加 T 维。断言 `[B,3,8,32,32]` → patch 数\n   `(8/tt)·(32/th)·(32/tw)`，shape walk 对上。\n2. **tube masking**：先在 `(h,w)` 网格上抽要遮的空间位置，再沿 T 广播。断言**任一空间位置在\n   所有帧上的遮挡状态完全一致**（这就是 tube 的定义，错了就退化成 per-frame）。\n3. **掩码率 75% → 90%**，其余骨架不动，跑训练。\n4. **对照实验**（⭐）：tube vs per-frame 各训一遍。跑之前先预测：哪种的 loss 会**异常低**？\n   为什么低反而是坏事？\n\n## ⭐ 必做的 sanity\n\n`train_sanity.py`：合成视频训练，断言 loss 显著下降，存 `clips.png`（输入片段）和重建图。\n可加对照：**每帧独立遮**时 loss 异常低（说明在抄帧）vs **tube masking** 下 loss 正常——直观证明 tube 的必要性。\n\n## ✅ 盲讲检查点\n\n1. tubelet 和 2D patch 的区别？为什么用 Conv3d？\n2. tube masking 具体怎么遮？为什么不能每帧独立遮？\n3. 掩码率为什么从 75% 提到 90%？\n4. joint vs divided 注意力的取舍？（token 数爆炸时省算力）\n5. 哪些部分和 image MAE 完全一样？哪 4 处变了？\n\n> 下一站 [`../clip`](../clip)：换条路打通图文——用对比学习对齐，而不是重建。\n", "code": "", "code_file": null, "zone": "vision", "qwen": "视频掩码自监督", "replaces": "图像级自监督", "who": "VideoMAE"}, {"key": "cv/vl", "name": "vl", "title": "cv/vl — Vision → token → LLM 拼接（LLaVA-style）", "oneliner": "图过一个**冻结的** ViT 拿 patch 特征 → 一个 **projector (MLP)** 把它投到 LLM 的词向量空间 →", "mastery": "spec", "readme": "# cv/vl — Vision → token → LLM 拼接（LLaVA-style）\n\n> **📌 一手出处 / official reference**\n> - 论文 *Visual Instruction Tuning*（LLaVA）— Liu et al., NeurIPS 2023 · [arXiv:2304.08485](https://arxiv.org/abs/2304.08485)\n> - 官方实现 [haotian-liu/LLaVA](https://github.com/haotian-liu/LLaVA)\n\n> 学习笔记 + 复现 spec。目标：复现完 [`vl.py`](vl.py) 后，能讲清\n> **视觉 token 如何拼进 LLM 序列、projector 的角色**。这是 CV 线接 [`../../llm`](../../llm) 的桥。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n图过一个**冻结的** ViT 拿 patch 特征 → 一个 **projector (MLP)** 把它投到 LLM 的词向量空间 →\n把这些视觉向量**塞进文本序列里 `<image>` 占位符的位置** → LLM 拿到一条 `[文本|视觉|文本]` 的混合\n序列，做**普通 causal self-attention**，根本不区分哪些位置来自像素、哪些来自单词。\n\n## 🎯 先猜：LLM 怎么区分序列里哪些 token 来自图、哪些来自文字？（想 30 秒）\n\n**答案：它根本不区分。projector 把视觉单位变成 `d_llm` 向量后，和文本 token 一视同仁做 causal\nattention。projector 扮演的就是「图像的 embedding 层」。**\n\n```\n文本:  token id        ──nn.Embedding──►  d_llm 向量\n图像:  ViT patch 特征   ──projector(MLP)──►  d_llm 向量      ← 同一个目标空间！\n```\n\n文本进 Transformer 靠 `token id → 查表 → 向量`；图像没有 id，但 projector 扮演**完全对称**的\n角色：把视觉单位变成一个 LLM 能吃的 `d_llm` 向量。一旦都变成 `d_llm` 向量，拼在一起 LLM 一视同仁。\n**整个组件最值钱的就是 `embed_sequence` 里 `merged[is_img] = vis` 那一行。**\n\n## tensor 流（`vl.py` 的 shape walk）\n\n```\npixels [B,3,32,32] ─ frozen ViT(patch16→4 patch) ─► feats [B,4,d_vision]\n                       │ projector (Linear→GELU→Linear)\n                       ▼\n                     vis [B,4,d_llm]              ← 视觉 token，已在词向量空间\n文本 ids [B,7]=[BOS,IMG,IMG,IMG,IMG,<colour>,EOS] ─ tok_embed ─► [B,7,d_llm]\n                       │  *** 把 vis 覆盖到 IMG 占位符的 4 个位置 ***\n                       ▼\nmerged [B,7,d_llm]=[BOS|vis0 vis1 vis2 vis3|colour|EOS]\n                       │ + 位置编码 → causal Transformer\n                       ▼\nlogits [B,7,vocab]     → 在最后一个 IMG 位置预测颜色词\n```\n\n## toy 任务为什么能验证「视觉真进了 LLM」\n\n图像是一个**随机颜色方块**，文本模板对所有样本都一样、要 LLM 说出颜色名。**区分样本的唯一信息\n就是图像**。所以只有当梯度沿 `LM → 视觉 token → projector` 回传、projector 学会把像素特征变成\nLM 读得懂的 token，颜色准确率才可能上去。✓ 证明 concat pipeline 端到端可微、视觉信息确实流进了 LM。\n\n## 和真实 LLaVA 的关系（两阶段）\n\n| | 冻结 | 训练 | 目的 |\n|---|---|---|---|\n| Stage 1 对齐 | 预训练 LLM + ViT | **只训 projector** | 让 projector 学会翻译到 LLM 词空间 |\n| Stage 2 指令微调 | ViT（通常） | projector + **解冻 LLM** | 教模型按指令用视觉信息 |\n\n本 toy 的小 LM 是**从零和 projector 一起训**的（它没有语言先验，冻结无意义）；真实 LLaVA stage-1\n是冻结预训练 LM、只训 projector。被演示的**机制**（projector + splice + 混合序列 causal attention）两者一样。\n\n## 你要复现的目标（TODO）\n\n文件：`vl.py`、`train_sanity.py`。视觉塔可复用 [`../vit`](../vit)，LM 用 [`../../llm/nano`](../../llm/nano) 的 causal 版。\n\n```python\nclass VLModel(nn.Module):\n    # vision (frozen ViT) + projector(MLP d_vision→d_llm) + lm(causal Transformer)\n    def embed_sequence(self, ids, pixels):\n        emb = tok_embed(ids)                 # [B,L,d_llm]\n        vis = projector(vision(pixels))      # [B,n_img,d_llm]\n        emb[ids == IMG_TOKEN] = vis.reshape(-1, d_llm)   # ★ splice\n        return emb\n```\n\nsplice 那行的隐藏前提（写错就静默错位）：`ids == IMG_TOKEN` 的布尔 mask 按**行优先**展平，\n`vis.reshape(-1, d_llm)` 也按 batch×n_img 行优先展平——两边顺序必须一致，且\n**占位符个数 == 视觉 token 数**（每张图 n_img 个，整个 batch 共 `B·n_img` 个 IMG）。\n先写一条断言把这两个数卡死，再训练。\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **冻结 ViT + projector 出视觉 token**：断言 `vis` 是 `[B,n_img,d_llm]`，且\n   `vision` 的参数 `requires_grad=False`（冻结真的生效了）。\n2. **splice**：断言 IMG 占位符个数 == `B·n_img`；splice 后非 IMG 位置的 embedding 和\n   `tok_embed(ids)` 逐元素相等（只覆盖了该覆盖的位置）。\n3. **端到端 forward + 训练**：跑 ⭐，颜色准确率 → 1.0。\n4. **可微性反证**（机制的直接证据）：把 projector 的梯度 detach 掉再训一次 → 准确率卡在\n   chance。证明「颜色信息只能沿 LM→视觉 token→projector 这条路回传」。\n\n## ⭐ 必做的 sanity\n\n`train_sanity.py`：训 ~400 步，颜色准确率 →1.0，存 `predictions.png`。\n\n## ✅ 盲讲检查点\n\n1. projector 的作用用一句话类比？\n2. 视觉向量怎么「进入」序列？维度为什么必须是 `d_llm`？\n3. LLM 怎么区分视觉 token 和文本 token？\n4. 为什么这个 toy 必须靠图像才能答对颜色？\n5. 真实 LLaVA 两阶段分别冻结/训练什么？本 toy 哪里不同、为什么？\n6. 和 [`../clip`](../clip) 的「对比对齐」相比，这条路线打通图文的方式有何本质不同？\n\n> CV 主线收尾，也接上了 [`../../llm`](../../llm)。三条主线读完回 [根 README](../..) 总览。\n", "code": "", "code_file": null, "zone": "join", "qwen": "MLP projector · splice", "replaces": "原样塞所有 patch token", "who": "LLaVA / Qwen-VL"}, {"key": "cv/mrope", "name": "mrope", "title": "cv/mrope — M-RoPE：视觉 token 的地址从标量变 (t,h,w)", "oneliner": "视觉 token 进序列后（[`../vl`](../vl)），naive 做法按扁平顺序给位置 id——LLM 不知道 token #786", "mastery": "spec", "readme": "# cv/mrope — M-RoPE：视觉 token 的地址从标量变 (t,h,w)\n\n> **📌 一手出处 / official reference**\n> - *Qwen2-VL* — Wang et al., 2024 · [arXiv:2409.12191](https://arxiv.org/abs/2409.12191)——M-RoPE 的出处，dynamic resolution 的工业范本\n> - *Qwen2.5-VL Technical Report* — 2025 · [arXiv:2502.13923](https://arxiv.org/abs/2502.13923)——t 维对齐绝对时间戳\n> - 变长分辨率的根：NaViT（Patch n' Pack）— [arXiv:2307.06304](https://arxiv.org/abs/2307.06304)\n> - 前置：[`../../llm/rope`](../../llm/rope)（旋转位置编码本体）、[`../vl`](../vl)（视觉 token 进序列）\n\n> 学习笔记 + 复现 spec。目标：复现完 `mrope.py` 后，能讲清\n> **「不加任何参数，只把 position id 从标量变成 (t,h,w) 三元组，LLM 就能分清『同一空间位置的相邻两帧』；纯文本时它数值上精确退化为 1D RoPE」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n视觉 token 进序列后（[`../vl`](../vl)），naive 做法按扁平顺序给位置 id——LLM 不知道 token #786\n和 #1362 是「同一空间位置、相邻两帧」。M-RoPE 把每个 head 的旋转频率槽切成三段（Qwen2-VL：\nd_k=128 → 64 个频率槽，按 t:16 / h:24 / w:24 分），position id 变成三元组：**文本** (i,i,i)\n同步递增；**图像** t 不动、(h,w) 走网格；**视频** t 按帧号走。同一个 rope buffer，零新参数。\n\n## 🎯 反直觉 1 ｜ 先猜：把现成文本 LLM 换上 M-RoPE，纯文本输入的 logits 会变吗？（想 30 秒）\n\n**答案：一个比特都不变——纯文本时 M-RoPE 数值上精确退化为 1D RoPE。这是它能「白嫖」进现成 LLM 的根。**\n\n文本 token 的 id 是 (i,i,i)：三段频率槽各自用同一个标量 i 旋转，拼起来和 1D RoPE 用 i 旋转\n**逐元素相等**（频率 schedule 没变，只是槽被分了组）。所以预训练文本 LLM 换上 M-RoPE，纯文本\n输入的 logits **一个比特都不变**——这就是它能「白嫖」进现成 LLM 的原因。这一条是必做断言，\n不是比喻。\n\n## 🎯 盯死的反直觉机制 2：相对位置差解耦到三个轴\n\n[`../../llm/rope`](../../llm/rope) 的核心性质——点积只依赖相对位置差——现在**按轴成立**：\n相邻帧同空间位置的两个 token，h/w 子空间旋转差为 0，只在 t 子空间差一个小旋转。「同位置、\n下一帧」从此是个固定的几何关系，而不是「往后数 144 个 token」这种和分辨率耦合的脆弱模式。\n另一个直接红利：视频的 t-id 按**帧数**涨、不按帧数×每帧 token 涨——10 分钟视频的最大位置 id\n从 ~35 万掉回 ~600，**远离外推悬崖**。\n\n## 🎯 盯死的反直觉机制 3：两套位置系统，别混\n\n| | vision encoder 内（ViT 的 2D RoPE） | LLM 序列上（M-RoPE） |\n|---|---|---|\n| 解决什么 | patch 在**一张图的网格**里的相对位置 | 文/图/视频 token 在**统一序列**里的编址 |\n| 作用域 | encoder 自己，出 feature 即结束 | LLM 每一层的 attention |\n| 服务于 | dynamic resolution（变长网格） | 模态混排 + 时间结构 |\n\nQwen2-VL 两套都有，互不替代。dynamic resolution（NaViT 路线：不 resize，原生分辨率 → 变长\ntoken 网格）正是 (h,w) id 直接取自真实网格坐标的原因。\n\n脚注两则：视觉块之后的文本 id 从 max(已用 id)+1 继续，避免重叠；Qwen2.5-VL 把 t-id 进一步对齐\n**绝对时间**（秒）——帧率变了模型也有「速度感」，秒级事件定位由此而来。\n\n## 你要复现的目标（TODO）\n\n文件：`mrope.py`、`data_synthetic.py`、`train_sanity.py`。LM 骨架用\n[`../../llm/ref/nano.py`](../../llm/ref/nano.py)，把 rope 的 `pos` 从 `[L]` 改成 `[L,3]`，\n加一个 `mrope_section=[s_t,s_h,s_w]`。\n\n```python\ndef mrope(x, pos3, section):      # x:[B,H,L,d]  pos3:[L,3]  按 section 切频率槽分别旋转\ndef position_ids(ids, grids):     # 文本 (i,i,i)；视频 token (帧号,行,列)；视觉块后从 max+1 续\n# toy：4 帧合成视频，方块向左/右/上/下移动，问「往哪边移」——唯一的信息在帧序里\n```\n\n`mrope` 的关键：**复用 [`../../llm/rope`](../../llm/rope) 的 cos/sin 构建，不要重写旋转**。\n唯一的新动作是「每个频率槽该用 t、h 还是 w 这个轴的 position 去查角度」。设 `d/2` 个频率槽按\n`section=[s_t,s_h,s_w]`（和 = d/2）分组：\n\n```python\n# cos_full/sin_full 来自 rope，shape [max_pos, d/2]；pos3:[L,3] 是每个 token 的 (t,h,w)\ndef mrope(x, pos3, section):\n    cos_parts, sin_parts = [], []\n    for axis, s in enumerate(section):          # axis 0=t,1=h,2=w\n        lo = sum(section[:axis]); hi = lo + s   # 这一段占的频率槽\n        p = pos3[:, axis]                       # [L] 该轴的 position\n        cos_parts.append(cos_full[p, lo:hi])    # 用该轴 position 查这段槽的角度\n        sin_parts.append(sin_full[p, lo:hi])\n    cos = cat(cos_parts, -1); sin = cat(sin_parts, -1)   # [L, d/2]，拼回完整宽度\n    return apply_rope(x, cos, sin)              # 复用 rope 的 apply_rope，一字不改\n```\n\n验证它真退化：`pos3 = [[i,i,i] for i in range(L)]` 时，三段都用同一个 i 查，`cos/sin` 拼出来\n和 1D rope 的 `cos_full[arange(L)]` 逐元素相等——这正是 ⭐ 的退化断言。\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **`mrope` + 退化断言**：按上面写完，先只测纯文本 `(i,i,i)` == 1D rope（⭐ 第 1 条）。\n   这一级把「频率槽分段」的逻辑焊死，且不依赖任何训练。\n2. **`position_ids`**：文本 (i,i,i)、视频 token (帧号,行,列)、视觉块后从 max+1 续。\n   断言一段「文本→视频→文本」序列的 id 没有重叠、且视频段 t 按帧号走。\n3. **方向任务训练**：4 帧合成视频，方块四向移动，训到准确率 ≥ 0.9。\n4. **两个对照断言**（⭐ 第 2、3 条）：shuffle t-id → 准确率回 chance；整体平移 t-id → logits 不变。\n   跑前先预测这两个结果，它们一正一反卡住「方向信息只在 t 轴位置里」。\n\n## ⭐ 必做的 sanity\n\n1. **退化断言**（机制 1）：随机 q/k，纯文本 pos (i,i,i) 的 M-RoPE 输出与 1D RoPE 输出 `allclose`。\n2. **方向任务 + shuffle 对照**（机制 2）：训到准确率 ≥0.9 后，把各帧的 t-id 随机 shuffle →\n   准确率跌回 ~chance（方向信息确实编码在 t 轴位置里，不在内容里）。\n3. **平移断言**：整段视频的 t-id 全体 +Δ，logits 不变（相对性按轴成立）。\n\n## ✅ 盲讲检查点\n\n1. M-RoPE 改了 rope 的什么、没改什么？新增参数几个？\n2. 文本/图像/视频的 position id 各怎么给？视觉块之后文本从哪续？\n3. 为什么纯文本时和 1D RoPE 数值相等？这件事为什么重要？\n4. 「同位置、下一帧」在 M-RoPE 下是什么几何关系？naive 扁平 id 下又是什么？\n5. encoder 内 2D RoPE 和 LLM 侧 M-RoPE 各管什么？为什么不能互相替代？\n6. 视频 t-id 按帧涨给长上下文外推带来什么红利？Qwen2.5-VL 在 t 轴上又加了什么？\n\n> 支线主干到此收口：账本（[`../tokbudget`](../tokbudget)）→ 选帧（[`../framesample`](../framesample)）\n> → 压 token（[`../tokmerge`](../tokmerge)）→ 编址（mrope）。可做项 [`../siglip`](../siglip)\n> 讲视觉塔的训练目标；回 [`../`](../) 看全图。\n", "code": "", "code_file": null, "zone": "join", "qwen": "M-RoPE 多模态位置", "replaces": "1D RoPE 处理多模态", "who": "Qwen2-VL / 2.5-VL"}, {"key": "cv/tokmerge", "name": "tokmerge", "title": "cv/tokmerge — 空间 merge：encoder 之后、进 LLM 之前的 token 预算", "oneliner": "ViT 输出的 patch 特征摆回 2D 网格 `[H,W,C]` → 每个 2×2 邻域 concat 到通道维 → `[H/2,W/2,4C]`", "mastery": "spec", "readme": "# cv/tokmerge — 空间 merge：encoder 之后、进 LLM 之前的 token 预算\n\n> **📌 一手出处 / official reference**\n> - *Qwen2-VL* — Wang et al., 2024 · [arXiv:2409.12191](https://arxiv.org/abs/2409.12191)——相邻 2×2 patch 特征 concat 后过 MLP 压成 1 个 token\n> - *InternVL 1.5: How Far Are We to GPT-4V?* — Chen et al., 2024 · [arXiv:2404.16821](https://arxiv.org/abs/2404.16821)——pixel shuffle，448px tile 的 1024 patch → 256 token\n> - 对照路线（query 压缩）：BLIP-2 Q-Former [2301.12597](https://arxiv.org/abs/2301.12597)、Flamingo Perceiver Resampler [2204.14198](https://arxiv.org/abs/2204.14198)\n> - 运行时剪枝（选做）：FastV — [arXiv:2403.06764](https://arxiv.org/abs/2403.06764)\n\n> 学习笔记 + 复现 spec。目标：复现完 `tokmerge.py` + 双任务实验后，能讲清\n> **「merge 怎么在不丢数值的前提下砍 4× token；以及『视觉 token 冗余』为什么是任务相关的命题、不是图像的固有属性」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\nViT 输出的 patch 特征摆回 2D 网格 `[H,W,C]` → 每个 2×2 邻域 concat 到通道维 → `[H/2,W/2,4C]`\n→ MLP 投到 `d_llm`。token 数 ÷4，但**数值上一个没丢**——全搬进了通道维。丢的是 LLM 在空间维\n做 attention 的**粒度**：最小可寻址单元从 14px patch 变成 28px 块。\n\n## 🎯 盯死的反直觉机制 1：token 数和信息量解耦\n\naverage pooling 是真扔信息（4 个向量平均成 1 个）；pixel-shuffle / merge 是**重排**（4 个向量\nconcat 成 1 个 4 倍长的）。那代价在哪？信息还在，但从「attention 可寻址的空间位置」变成了\n「藏在通道里、要靠后续 MLP / attention head 隐式解码」。粗任务解码得动，细粒度空间任务解码\n不动——这直接引出机制 2。\n\n## 🎯 反直觉 2（headline）｜ 先猜：同一张图、同一个 16× merge，OCR 任务和「认主色」任务掉点一样吗？\n\n**答案：完全不一样——认主色 16× 不掉，OCR 在 4× 就崩。冗余是任务的属性，不是图的属性。**\n\n同一张图、同一个 merge，两个任务的压缩曲线完全两样：\n\n```\nTask A（粗）: 方块的主颜色是什么            Task B（细）: 5×5 网格里哪个 cell 有 3px 小点\nacc                                        acc\n1.0 ──●────●────●    1× 4× 16× 全平        1.0 ──●\n                                                   \\●\n                                                     \\____●    高压缩处跌穿\n     1×   4×   16×                               1×   4×   16×\n```\n\n**禁止从 Task A 得出「视觉 token 冗余、随便压 16×」**——这句话在 coarse VQA 上成立，在 OCR /\n小目标 / grounding 上直接崩。正确结论（也是这条支线的 research statement）：\n**压缩该是 adaptive 的，因为信息密度随任务 / 帧 / 区域变化**。\n\n## === DIFF: merge vs Q-Former vs runtime pruning ===\n\n| | pixel-shuffle / 2×2 merge | Q-Former / Perceiver | FastV 式剪枝 |\n|---|---|---|---|\n| 在链条哪段 | encoder 后、LLM 前 | 同左 | **LLM 第 k 层之后** |\n| 输出 token 数 | 输入 ÷ rate²（随输入变） | **固定 K**（与输入无关） | 输入 × 保留率 |\n| 参数 | 无 / 一个 MLP | 一组可学 query + cross-attn | **零**（免训练） |\n| 信息 | 重排，数值不丢 | 瓶颈，有损 | 按 attention 排序硬丢 |\n| 现状 | 2024–25 image VLM 主流 | image 退潮；video per-frame 预算仍在用 | 部署期叠加项 |\n\nQ-Former 的思想（固定预算的低秩瓶颈）和 [`../../llm/mla`](../../llm/mla) 同源；兴衰史见\n[`../tokbudget`](../tokbudget)。\n\n## 你要复现的目标（TODO）\n\n文件：`tokmerge.py`、`data_synthetic.py`（两个任务的合成数据）、`train_sanity.py`。\n骨架直接用 [`../vl`](../vl) 的 toy，把 merger 插在 vision 和 projector 之间。\n\n```python\nclass PixelShuffleMerger(nn.Module):\n    def __init__(self, rate): ...        # rate=2 → token ÷4，通道 ×4\n    def forward(self, x, grid_hw): ...   # [B, H*W, C] -> [B, H*W/rate², C*rate²]\n```\n\n**那个 ÷4 的空间重排是整件事唯一会写错的地方**，给出确切的 reshape 链（rate=r）：\n\n```python\nB, _, C = x.shape;  H, W = grid_hw                 # 先从一维 token 摆回 2D 网格\nx = x.view(B, H, W, C)\nx = x.view(B, H//r, r, W//r, r, C)                 # 把 H、W 各劈成 (块, 块内)\nx = x.permute(0, 1, 3, 2, 4, 5)                    # 把两个「块内」维挪到一起\nx = x.reshape(B, (H//r)*(W//r), r*r*C)             # 同一 r×r 邻域的 r²个向量 concat 进通道\n# 然后一个 Linear(r*r*C -> d_llm)。注意 permute 的顺序：错了就是「跨块拼接」而非「块内拼接」\n```\n\n自查：`r=2` 时 `[B,64,C]`（8×8 网格）→ `[B,16,4C]`。**断言 merge 前后所有元素的多重集相同**\n（permute+reshape 是纯重排，一个数都不该丢）——这条断言一票否决「写成了 pooling」。\n\n```python\n# 实验矩阵：rate ∈ {1, 2, 4} × task ∈ {A 粗, B 细} → 6 次训练，两条曲线存 curves.png\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **`PixelShuffleMerger` 单测**：按上面的 reshape 链写，跑 shape 断言 + 多重集断言\n   （⭐ 第 1 条）。这一级独立于训练，先把它焊死。\n2. **插进 vl toy**：merger 放在 vision 和 projector 之间，`rate=1` 时（退化为不 merge）\n   准确率应与原 vl 一致——证明只是插了根管子、没改语义。\n3. **两个合成任务**：Task A 主色、Task B 5×5 网格找 3px 小点（`data_synthetic.py`）。\n4. **跑 6 格实验矩阵**：rate∈{1,2,4} × task∈{A,B}。跑前先预测两条曲线的形状（⭐ 第 2 条）。\n\n## ⭐ 必做的 sanity\n\n1. shape 断言：`[B,64,C]` → rate 2 → `[B,16,4C]`，且 merge 前后元素多重集相同（重排不丢数）。\n2. **双任务曲线**：Task A 三个 rate 的准确率差 < 5%；Task B 在高 rate 相对 rate 1 显著掉。\n   这就是「冗余任务相关」的直接证据，存 `curves.png`。\n3. （选做，~30 min）FastV 式剪枝：vl toy 第 2 层后按视觉 token 收到的 attention 排序、丢一半，\n   测准确率——体会「免训练也能剪」，以及它和 merge 是叠加关系。\n\n## ✅ 盲讲检查点\n\n1. pixel-shuffle 和 average pooling 在信息上的本质区别？那 merge 的代价到底是什么？\n2. 为什么 2024–25 的 image VLM 用 merge 而不是 Q-Former？Q-Former 在哪还活着？\n3. 双任务曲线分别说明什么？哪句流行结论是被禁止的？\n4. FastV 剪在链条哪一段？为什么免训练也行？它和 merge 是替代还是叠加？\n5. 336px / patch 14 的一张图，2×2 merge 前后各几个 token？\n6. reshape 链里 permute 那一步如果顺序写错，会 concat 成什么？为什么多重集断言抓不住它、但准确率会崩？\n\n> 下一站 [`../mrope`](../mrope)：token 变少了，最后一个问题是它们的「地址」怎么写。\n", "code": "", "code_file": null, "zone": "budget", "qwen": "2×2 token 合并", "replaces": "传全部 patch token", "who": "Qwen-VL merger"}, {"key": "cv/framesample", "name": "framesample", "title": "cv/framesample — 帧采样：encoder 之前的时间预算", "oneliner": "长视频不可能全喂。预算 K 帧时，uniform 采样对「只占 5 帧的事件」的召回是个**纯几何量**：", "mastery": "spec", "readme": "# cv/framesample — 帧采样：encoder 之前的时间预算\n\n> **📌 一手出处 / official reference**\n> - *VideoAgent: Long-form Video Understanding with Large Language Model as Agent* — Wang et al., ECCV 2024 · [arXiv:2403.10517](https://arxiv.org/abs/2403.10517)——query-guided 迭代选帧，平均 8.4 帧打平用几百帧的方法\n> - *Adaptive Keyframe Sampling for Long Video Understanding*（AKS）— Tang et al., CVPR 2025 · [arXiv:2502.21271](https://arxiv.org/abs/2502.21271)——相关性 + 覆盖度的选帧优化\n> - 现状基线：几乎所有 video MLLM 的默认 = uniform sampling + 帧数上限\n\n> 学习笔记 + 复现 spec。目标：复现完 `framesample.py` 后，能讲清\n> **「帧预算固定时，选哪几帧在 encoder 之前就决定了答案存不存在——这是预算链条上最便宜也最致命的一段」**。\n> 复习时：先做文末盲讲检查点，全答上来就直接跑代码。\n\n## 一句话 mental model\n\n长视频不可能全喂。预算 K 帧时，uniform 采样对「只占 5 帧的事件」的召回是个**纯几何量**：\nstride = N/K，命中概率 ≈ 事件长 / stride——和模型多强**无关**。query-guided（按与问题的相关性\n给帧打分、取 top-K）把同一预算下的召回拉到接近 1。\n\n## 🎯 先猜：600 帧视频里一个 5 帧的事件，uniform 采 8 帧能命中的概率是多少？（先估一个数）\n\n**答案：≈ 6.7%，而且和模型多强无关——这是个纯几何量（召回 ≈ 事件长 / stride）。**\n\n600 帧、事件占连续 5 帧、uniform 采 K 帧（stride = 600/K）：\n\n| K | stride | 召回 ≈ 5/stride |\n|---|---|---|\n| 8 | 75 | **6.7%** |\n| 16 | 37.5 | 13.3% |\n| 32 | 18.75 | 26.7% |\n\n召回要过半得采 240 帧——预算直接爆炸。换句话说：uniform 采样下模型答不出「视频里有没有闪过\n红光」，**不是理解问题，是那 5 帧根本没进过 encoder**。\n\n## 🎯 盯死的反直觉机制 2：最上游的损失不可逆\n\n[`../tokmerge`](../tokmerge) 的 pixel-shuffle 把信息搬进通道维，数值上没丢；帧没被采到，\n后面的 merge 也好、adaptive compression 也好，**全都救不回来**。所以预算链条要从上游往下游省：\n先保证对的帧进来，再谈每帧花几个 token。\n\n## 策略谱系（README 层面讲清，toy 只做两端）\n\n| 策略 | 思路 | 盲区 / 代价 |\n|---|---|---|\n| uniform | 等距，无任何先验 | 召回上限是几何量 |\n| scene-change / motion-based | 像素差、光流驱动；content-aware 但 query-blind | 对「静态但关键」的帧盲 |\n| keyframe（AKS） | 相关性 + 覆盖度联合优化 | 需要便宜的打分器 |\n| query-guided（VideoAgent） | 用问题检索帧、不够再迭代补 | 需要 query 先到 |\n| streaming online 选帧 | 边来边决定存不存（接 [`../tokbudget`](../tokbudget) 谱系的 memory 类） | 不能回头 |\n\n## 你要复现的目标（TODO）\n\n文件：`framesample.py`、`data_synthetic.py`。无需训练，无需 GPU。\n\n```python\n# data: 600 帧合成视频（灰底），随机起点的连续 5 帧出现红色方块\n# query「红色出现在哪」→ toy 打分器 = 每帧与「红」的颜色直方图相似度\ndef sample_uniform(n_frames, k): ...\ndef sample_query_guided(frames, query_scorer, k): ...   # top-K by score\n# recall = 采到的帧与事件帧是否有交集\n```\n\n## 🪜 实现阶梯（每级跑通断言再上一级）\n\n1. **合成数据 + 解析式**：600 帧、随机起点的连续 5 帧染红。先手写召回解析式\n   （`min(1, 事件长/stride)` 的期望），跑前预测 K=8/16/32 三个数。\n2. **`sample_uniform` + 蒙特卡洛**：1000 条视频实测召回，对上解析式（⭐ 第 1 条）。\n3. **`sample_query_guided`**：toy 打分器 = 每帧与「红」的颜色直方图相似度，取 top-K。\n   断言同预算 K=8 召回 > 0.95（⭐ 第 2 条）。\n4. **（选做）事件时长扫描**：5→50 帧，画 uniform 召回随占比上升的曲线。\n\n## ⭐ 必做的 sanity\n\n1. 蒙特卡洛 1000 条合成视频：uniform 实测召回与解析式 5/stride 吻合（±2%）。\n2. 同预算 K=8：query-guided 召回 > 0.95。\n3. （选做）事件时长 5→50 帧扫一遍：uniform 召回随事件占比线性上升——**时间冗余度不均匀**\n   这件事本身，就是 adaptive sampling 的立项理由。\n\n## ✅ 盲讲检查点\n\n1. uniform 召回的解析式？由哪些量决定？为什么和模型无关？\n2. 为什么这一段的损失不可逆，而 merge 的「损失」某种意义上可逆？\n3. query-guided 的两个前提？streaming 场景下哪个被破坏了？\n4. 真实系统「2 fps + 最多 N 帧」的折中在折什么？\n5. AKS 在相关性之外为什么还要加「覆盖度」一项？（只按相关性会全挤在同一个片段里）\n\n> 下一站 [`../tokmerge`](../tokmerge)：对的帧进来了，下一刀砍在每帧的 token 数上。\n", "code": "", "code_file": null, "zone": "budget", "qwen": "dynamic FPS 采样", "replaces": "固定均匀抽帧", "who": "所有视频 VLM"}, {"key": "llm/bpe", "name": "bpe", "title": "llm/bpe — Byte-Pair Encoding tokenizer", "oneliner": "A byte-level BPE tokenizer (~180-line core + showcase), trained on the Taylor Swift Wikipedia article in **two languages** to show how byte-level BPE behaves on", "mastery": "explained", "readme": "# llm/bpe — Byte-Pair Encoding tokenizer\n\nA byte-level BPE tokenizer (~180-line core + showcase), trained on the Taylor Swift Wikipedia article\nin **two languages** to show how byte-level BPE behaves on Latin vs CJK script. Two\ntraining paths (naive + a heap-based fast one) produce **identical** merges, full\n`encode`/`decode` round-trip, and a vocabulary you can read line by line.\n\n> **References** — Sennrich et al., *Neural Machine Translation of Rare Words with\n> Subword Units*, ACL 2016 ([arXiv:1508.07909](https://arxiv.org/abs/1508.07909)) ·\n> teaching implementation [karpathy/minbpe](https://github.com/karpathy/minbpe).\n\n## Results (`python bpe.py`)\n\nThe same Taylor Swift article in both languages, ~60 KB each, trained to vocab 512:\n\n| | English | Chinese 中文 |\n|---|---:|---:|\n| corpus | 60,853 chars / 60,940 bytes | 22,146 chars / 60,230 bytes |\n| bytes / char | 1.00 | 2.72 |\n| tokens @ vocab 512 | 28,386 | 29,449 |\n| compression (bytes/token) | **2.15×** | **2.05×** |\n| chars / token | 2.14 | 0.75 |\n| round-trip `decode(encode(x)) == x` | ✓ | ✓ |\n| `train_bpe_fast` == `train_bpe` | ✓ | ✓ |\n\nSame byte budget, same vocab — byte-level compression looks similar, but character-level efficiency diverges sharply. \n\n**In other words, Chinese pays an early character-assembly cost: many merges are spent rebuilding UTF-8 bytes into characters. After that threshold, its short, repetitive words compress efficiently — enough to overtake English in bytes/token. (→ [English vs Chinese](#english-vs-chinese))**\n\nRound-trip is also exact on emoji, mixed-script, and empty inputs (the `sanity()` check).\n\n**The fast path matters more as the vocabulary grows** (English, naive vs fast):\n\n| vocab | tokens | bytes/token | naive | fast | speedup |\n|------:|-------:|------------:|------:|-----:|--------:|\n| 512   | 28,386 | 2.15× | 1.42s | 0.09s | **16×** |\n| 1024  | 21,231 | 2.87× | 4.01s | 0.11s | **37×** |\n| 2048  | 16,926 | 3.60× | 7.63s | 0.12s | **62×** |\n\nThe naive cost grows with every merge; the fast path stays flat, so its advantage\nwidens with both vocab size and corpus length.\n\n## What it learns\n\nMerges are learned **in frequency order** — the earliest are the most common byte\npairs, and whole words assemble out of them later:\n\n```\nrank   0  256  ' a'      rank   6  262  ' the'  = ' t' + 'he'\nrank   1  257  'he'      rank  13  269  ' and'  = ' a' + 'nd'\nrank   2  258  ' t'      ...\nrank   3  259  'in'      longest tokens by the end:\nrank   4  260  'on'        ' Billboard'  ' country'  ' Swift'  ' album'\nrank   5  261  'er'        ' Awards'  ' albums'  ' music'  ' artist'\n```\n\nCommon strings collapse to a few tokens; rare ones stay in pieces; numbers never\nclump; spaces fuse onto the following word:\n\n```\n'Taylor Swift'  ->  ['T', 'aylor', ' Swift']     a frequent name\n' the album'    ->  [' the', ' album']           space merges INTO the word\n're-recording'  ->  ['re', '-', 're', 'cord', 'ing']\n'1989'          ->  ['19', '8', '9']             digits never form long tokens\n'qwxz'          ->  ['q', 'w', 'x', 'z']         rare run -> raw bytes, never OOV\n```\n\n## English vs Chinese\n\nSame article, same ~60 KB. The Chinese corpus\n([`data/taylorswift_zh.txt`](data/taylorswift_zh.txt)) is the same page from\n[zh.wikipedia](https://zh.wikipedia.org/wiki/泰勒·斯威夫特), almost identical in bytes\n(60,230 vs 60,940). But English is ASCII (**1.00 bytes/char**) while Chinese is CJK\n(**2.72 bytes/char**) — and byte-level BPE sees only raw bytes.\n\n| vocab | EN tokens | EN B/tok | EN ch/tok | ZH tokens | ZH B/tok | ZH ch/tok |\n|------:|----------:|---------:|----------:|----------:|---------:|----------:|\n| 512   | 28,386 | 2.15 | **2.14** | 29,449 | 2.05 | **0.75** |\n| 1024  | 21,231 | 2.87 | 2.87 | 20,661 | 2.92 | 1.07 |\n| 2048  | 16,926 | 3.60 | 3.60 | 15,140 | **3.98** | 1.46 |\n\n`bytes/token` is nearly identical — byte-level BPE is **script-agnostic on the byte\naxis**. The `chars/token` column exposes the hidden cost. Where do the 256 merges @512 go?\n\n| | multi-char words | single chars | byte fragments |\n|---|---:|---:|---:|\n| **English** | 255 | 0 | 1 |\n| **Chinese** | 29 | 118 | 109 |\n\n```\nfirst merges, EN:  ' a'  'he'  ' t'  'in'  'on'  'er'  ' the'  'ed'   -> straight to words\nfirst merges, ZH:  '�'  '�'  '�'  '�'  '，'  '�'  '的'  '�'           -> bytes into characters\n```\n\n- **English** is already one byte per char, so all 256 merges go straight to\n  words/subwords → **2.14 chars/token** immediately.\n- **Chinese** must first rebuild each character from its 3 bytes: **227 of 256 merges**\n  @512 are byte→char assembly (109 still mid-character `�`, 118 complete single chars),\n  leaving only **29** for real words (`斯威夫特` Taylor Swift, `公告牌` Billboard,\n  `专辑` album) — hence **< 1 char/token** at 512.\n- But Chinese words are short and repetitive, so once characters exist it catches up\n  fast and **overtakes English on bytes/token by vocab 2048** (3.98 vs 3.60).\n\nTakeaway: byte-level BPE pays a **character-assembly tax** on non-Latin scripts out of\nits early vocab budget — which is why multilingual production tokenizers use much\nlarger vocabularies.\n\n## Files\n\n| file | what |\n|---|---|\n| [`bpe.py`](bpe.py) | tokenizer + training showcase (run it directly) |\n| [`data/`](data) | `taylorswift{,_zh}.txt` corpora (~60 KB each) + generated `.vocab` / `.model` |\n\n```bash\npython bpe.py    # sanity, train EN + ZH, write data/*.vocab / *.model, print the comparison\n```\n\n`data/` holds both the input corpora and the generated artifacts: `*.model` (the merges,\nreloadable) and `*.vocab` (every learned token in merge order, human-readable).\n\n## API\n\n```python\nmerges = train_bpe(corpus, vocab_size)       # ordered dict[(int,int) -> int]\nmerges = train_bpe_fast(corpus, vocab_size)  # identical result, much faster\nids    = encode(text, merges)                # -> list[int]\ntext   = decode(ids, merges)                 # -> str   (round-trips)\n```\n\nTies are broken explicitly — highest count, then **lexicographically smallest pair**\n(not dict insertion order). That determinism is what lets the heap-based\n`train_bpe_fast` reproduce the naive merges exactly.\n\n## naive vs fast\n\n`train_bpe` rescans every chunk each round — `O(merges · N)`. `train_bpe_fast` keeps a\ndoubly-linked list over the bytes plus a lazy-deletion max-heap and only touches the\npairs around each merged position, giving the 16–62× speedups above on identical output.\n", "code": "\"\"\"Byte-level BPE tokenizer (minbpe-style).\n\nByte-level base (256 tokens) so it is never OOV; a regex pre-split keeps merges\ninside each chunk. train_bpe and train_bpe_fast produce identical merges; encode\nand decode round-trip any string.\n\n\"\"\"\n\nimport heapq\nimport regex as re\n\n# GPT-4 (cl100k_base) pre-split pattern. BPE only merges inside a chunk, never across\n# one -- the real source of leading-space tokens (\" the\") and digits capped at 3.\nSPLIT_PATTERN = (\n    r\"\"\"'(?i:[sdmt]|ll|ve|re)|[^\\r\\n\\p{L}\\p{N}]?+\\p{L}+|\\p{N}{1,3}\"\"\"\n    r\"\"\"| ?[^\\s\\p{L}\\p{N}]++[\\r\\n]*|\\s*[\\r\\n]|\\s+(?!\\S)|\\s+\"\"\"\n)\n\n\ndef get_stats(ids: list[int], counts: dict | None = None) -> dict[tuple[int, int], int]:\n    \"\"\"Count adjacent pairs in ids. Pass counts to accumulate across chunks.\"\"\"\n    counts = {} if counts is None else counts\n    for pair in zip(ids, ids[1:]):\n        counts[pair] = counts.get(pair, 0) + 1\n    return counts\n\n\ndef merge(ids: list[int], pair: tuple[int, int], idx: int) -> list[int]:\n    \"\"\"Replace every adjacent occurrence of pair in ids with the single token idx.\"\"\"\n    out = []\n    i = 0\n    while i < len(ids):\n        if i < len(ids) - 1 and ids[i] == pair[0] and ids[i + 1] == pair[1]:\n            out.append(idx)\n            i += 2\n        else:\n            out.append(ids[i])\n            i += 1\n    return out\n\n\ndef train_bpe(corpus: str, vocab_size: int) -> dict[tuple[int, int], int]:\n    \"\"\"Naive BPE: each round merge the most frequent pair (ties -> smallest pair).\"\"\"\n    assert vocab_size >= 256\n    num_merges = vocab_size - 256\n\n    chunks = re.findall(SPLIT_PATTERN, corpus)\n    ids = [list(ch.encode(\"utf-8\")) for ch in chunks]\n\n    merges = {}\n    for k in range(num_merges):\n        stats = {}\n        for chunk in ids:\n            get_stats(chunk, stats)\n        if not stats:\n            break\n        pair = min(stats, key=lambda p: (-stats[p], p))\n        idx = 256 + k\n        ids = [merge(chunk, pair, idx) for chunk in ids]\n        merges[pair] = idx\n    return merges\n\n\ndef encode(text: str, merges: dict[tuple[int, int], int]) -> list[int]:\n    \"\"\"Encode text to ids; inside each chunk repeatedly merge the lowest-rank pair.\"\"\"\n    out = []\n    for ch in re.findall(SPLIT_PATTERN, text):\n        ids = list(ch.encode(\"utf-8\"))\n        while len(ids) >= 2:\n            stats = get_stats(ids)\n            pair = min(stats, key=lambda p: merges.get(p, float(\"inf\")))\n            if pair not in merges:\n                break\n            ids = merge(ids, pair, merges[pair])\n        out.extend(ids)\n    return out\n\n\ndef build_vocab(merges: dict[tuple[int, int], int]) -> dict[int, bytes]:\n    \"\"\"Map every token id to its byte string: 256 base bytes + each learned merge.\"\"\"\n    vocab = {i: bytes([i]) for i in range(256)}\n    for (a, b), idx in merges.items():\n        vocab[idx] = vocab[a] + vocab[b]\n    return vocab\n\n\ndef decode(ids: list[int], merges: dict[tuple[int, int], int]) -> str:\n    \"\"\"Join each token's bytes, then decode (replace on partial utf-8).\"\"\"\n    vocab = build_vocab(merges)\n    data = b\"\".join(vocab[i] for i in ids)\n    return data.decode(\"utf-8\", errors=\"replace\")\n\n\ndef train_bpe_fast(corpus: str, vocab_size: int) -> dict[tuple[int, int], int]:\n    \"\"\"Incremental BPE: doubly-linked list + lazy-deletion heap. Same merges as train_bpe.\n\n    Instead of rescanning the whole corpus each merge, only the pairs around each merged\n    position are updated. Chunk ends keep -1 links so merges never cross a chunk.\n    \"\"\"\n    assert vocab_size >= 256\n    num_merges = vocab_size - 256\n\n    sym, prev, nxt = [], [], []\n    for ch in re.findall(SPLIT_PATTERN, corpus):\n        b = ch.encode(\"utf-8\")\n        base, m = len(sym), len(b)\n        for k, byte in enumerate(b):\n            sym.append(byte)\n            prev.append(base + k - 1 if k > 0 else -1)\n            nxt.append(base + k + 1 if k < m - 1 else -1)\n\n    pair_counts: dict[tuple[int, int], int] = {}\n    pair_positions: dict[tuple[int, int], set] = {}\n    heap: list[tuple[int, tuple[int, int]]] = []\n\n    def add_pair(i):\n        j = nxt[i]\n        if j == -1:\n            return\n        p = (sym[i], sym[j])\n        pair_counts[p] = pair_counts.get(p, 0) + 1\n        pair_positions.setdefault(p, set()).add(i)\n        heapq.heappush(heap, (-pair_counts[p], p))\n\n    def remove_pair(i):\n        j = nxt[i]\n        if j == -1:\n            return\n        p = (sym[i], sym[j])\n        pair_counts[p] -= 1\n        pair_positions[p].discard(i)\n        if pair_counts[p] > 0:\n            heapq.heappush(heap, (-pair_counts[p], p))\n\n    for i in range(len(sym)):\n        add_pair(i)\n\n    merges = {}\n    for k in range(num_merges):\n        pair = None\n        while heap:\n            negc, p = heapq.heappop(heap)\n            if pair_counts.get(p, 0) == -negc:  # lazy deletion: skip stale entries\n                pair = p\n                break\n        if pair is None:\n            break\n\n        a, b = pair\n        idx = 256 + k\n        merges[pair] = idx\n\n        for i in sorted(pair_positions[pair]):  # ascending order matches naive on AAAA\n            j = nxt[i]\n            if j == -1 or sym[i] != a or sym[j] != b:  # consumed by an overlap, skip\n                continue\n            h, k2 = prev[i], nxt[j]\n            if h != -1:\n                r
